<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ensō — build an agent you can trust, in ten moves</title>
<link rel="icon" href="data:,">
<style>
  :root {
    --bg:#fbfbfa; --fg:#1a1a1a; --muted:#9b9b97; --line:#ececea; --accent:#e8553e;
    --tint:rgba(232,85,62,0.06); --ink:#2b2b28; --paper:#faf8f5;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--fg); -webkit-font-smoothing:antialiased;
    font:17px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  .wrap { max-width:780px; margin:0 auto; padding:0 28px; }
  a { color:var(--accent); text-decoration:none; }
  code, .mono { font-family:"SF Mono", ui-monospace, Menlo, monospace; font-size:.86em; }

  header.top { position:sticky; top:0; z-index:20; background:var(--bg); border-bottom:1px solid var(--line); }
  header.top .wrap { display:flex; align-items:center; justify-content:space-between; height:60px; }
  .brand { display:flex; align-items:center; gap:12px; font-size:13px; font-weight:600;
    letter-spacing:.14em; text-transform:uppercase; color:var(--muted); }
  .modes { display:flex; gap:4px; }
  .modes button { border:1px solid var(--line); background:none; font:inherit; font-size:12px;
    font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--muted);
    padding:7px 14px; border-radius:100px; cursor:pointer; transition:all .15s ease-out; }
  .modes button.on { color:var(--bg); background:var(--fg); border-color:var(--fg); }
  .top .right { display:flex; align-items:center; gap:16px; }
  .repo { font-size:12px; font-weight:600; letter-spacing:.04em; color:var(--muted);
    border:1px solid var(--line); padding:7px 13px; border-radius:100px; transition:all .15s ease-out; }
  .repo:hover { color:var(--fg); border-color:var(--fg); }

  /* ensō — the SAME calligraphic brush as the video + the board (motion/src/Enso.tsx): a FILLED
     silhouette with variable width (thick belly, tapered tail, an open mouth), NOT a stroked ring. */
  .enso { width:30px; height:30px; flex:none; overflow:visible; }
  .enso .ink { fill:url(#ensoInk); }

  .hero { padding:13vh 0 8vh; text-align:center; border-bottom:1px solid var(--line); }
  .hero .enso { width:64px; height:64px; margin:0 auto 30px; }
  .hero h1 { font-size:38px; line-height:1.15; letter-spacing:-.02em; font-weight:600; margin-bottom:18px; }
  .hero .sub { font-size:19px; color:var(--muted); max-width:580px; margin:0 auto 14px; }
  .hero .thesis { font-size:15px; color:var(--ink); max-width:600px; margin:32px auto 0;
    padding-top:24px; border-top:1px solid var(--line); font-style:italic; }

  .coldopen { margin:48px 0; padding:28px 30px; border:1px solid var(--line); border-radius:14px;
    background:linear-gradient(180deg, var(--tint), transparent); }
  .coldopen .tag { font-size:12px; font-weight:600; letter-spacing:.12em; text-transform:uppercase;
    color:var(--accent); margin-bottom:10px; }
  .coldopen h2 { font-size:22px; margin-bottom:10px; letter-spacing:-.01em; }
  .coldopen p { color:var(--ink); margin-bottom:8px; }

  section.intro { padding:54px 0 10px; }
  .eyebrow { font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase;
    color:var(--muted); margin-bottom:14px; }
  .intro h2 { font-size:25px; letter-spacing:-.01em; margin-bottom:14px; }
  .intro p { color:var(--ink); margin-bottom:14px; }
  .arc-map { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin:24px 0 8px; }
  .arc-map .act { border:1px solid var(--line); border-radius:12px; padding:18px 20px; }
  .arc-map .act h3 { font-size:13px; letter-spacing:.08em; text-transform:uppercase; color:var(--accent); margin-bottom:10px; }
  .arc-map .act li { list-style:none; font-size:14.5px; color:var(--ink); padding:3px 0; }
  .arc-map .act .n { color:var(--muted); margin-right:8px; font-variant-numeric:tabular-nums; }

  /* design-philosophy strip */
  .principles { margin:30px 0 8px; }
  .principles .p { display:flex; gap:14px; padding:13px 0; border-top:1px solid var(--line); }
  .principles .p:last-child { border-bottom:1px solid var(--line); }
  .principles .p .k { flex:none; width:172px; font-size:13px; font-weight:600; color:var(--fg); }
  .principles .p .v { color:var(--ink); font-size:14.5px; }

  .stage { padding:46px 0; border-top:1px solid var(--line); }
  .stage .head { display:flex; align-items:baseline; gap:14px; margin-bottom:6px; }
  .stage .num { font-size:13px; font-weight:600; color:var(--muted); font-variant-numeric:tabular-nums; }
  .stage .gittag { margin-left:auto; font-size:12px; color:var(--muted); border:1px solid var(--line);
    border-radius:100px; padding:3px 11px; }
  .stage h2 { font-size:26px; letter-spacing:-.015em; }
  .stage .concept { font-size:18px; color:var(--ink); margin:10px 0 18px; }
  .stage .why { border-left:2px solid var(--accent); padding:2px 0 2px 16px; margin:18px 0;
    color:var(--fg); font-size:15.5px; }
  .label { font-size:12px; font-weight:600; letter-spacing:.1em; text-transform:uppercase;
    color:var(--muted); margin:24px 0 8px; }
  .see { color:var(--ink); font-size:15.5px; }

  .cmd { position:relative; background:var(--fg); color:var(--bg); border-radius:10px;
    padding:15px 17px; margin:8px 0; overflow-x:auto; }
  .cmd pre { font-family:"SF Mono", ui-monospace, Menlo, monospace; font-size:13px; line-height:1.7; white-space:pre; }
  .cmd .copy { position:absolute; top:9px; right:9px; border:none; background:rgba(251,251,250,.14);
    color:var(--bg); font:inherit; font-size:11px; letter-spacing:.06em; text-transform:uppercase;
    padding:4px 9px; border-radius:6px; cursor:pointer; opacity:0; transition:opacity .15s; }
  .cmd:hover .copy { opacity:1; }
  .cmd .copy.done { background:var(--accent); }
  .cmd .c { color:#cbb9a9; }

  .say { margin:20px 0 4px; padding:14px 16px; border:1px dashed var(--line); border-radius:10px;
    font-size:15px; color:var(--ink); }
  .say b { color:var(--accent); font-weight:600; letter-spacing:.04em; text-transform:uppercase; font-size:11px; }

  /* ── deep dive: diagram + code walkthrough + principle + construct ── */
  .deep { margin-top:30px; border-top:1px dashed var(--line); padding-top:8px; }
  .deep .how { color:var(--ink); font-size:15.5px; margin:8px 0; }
  .diagram { margin:16px 0; padding:22px 20px; border:1px solid var(--line); border-radius:12px; background:var(--bg); overflow-x:auto; }
  .diagram svg { width:100%; height:auto; display:block; }
  .diagram .cap { font-size:12.5px; color:var(--muted); margin-top:12px; text-align:center; }
  .code { position:relative; background:var(--paper); border:1px solid var(--line); border-radius:10px; padding:14px 16px; margin:10px 0; overflow-x:auto; }
  .code .copy { position:absolute; top:8px; right:8px; border:1px solid var(--line); background:var(--bg);
    color:var(--muted); font:inherit; font-size:11px; letter-spacing:.06em; text-transform:uppercase;
    padding:3px 9px; border-radius:6px; cursor:pointer; opacity:0; transition:opacity .15s; }
  .code:hover .copy { opacity:1; }
  .code .copy.done { color:var(--accent); border-color:var(--accent); }
  .code .fn { font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
  .code pre { font-family:"SF Mono", ui-monospace, Menlo, monospace; font-size:12.5px; line-height:1.7; white-space:pre; color:var(--fg); }
  /* themed syntax highlight — warm paper palette, four restrained hues (zen: few colors, used to mean) */
  .code .t-com  { color:var(--muted); }                 /* comments */
  .code .t-str  { color:#7a8a6b; }                       /* strings — muted sage (the one cool note) */
  .code .t-num  { color:#a76a4a; }                       /* numbers — the one warm clay */
  .code .t-key  { color:#8a6a52; font-weight:600; }      /* keywords — clay-brown + weight, NOT the accent */
  .code .t-fn   { color:var(--fg); }                     /* calls — plain ink; vermilion stays reserved to MEAN */
  .code .t-head { color:var(--fg); font-weight:600; }    /* markdown headings */
  .principle { margin:18px 0; padding:14px 18px; background:var(--tint); border-radius:10px; font-size:15px; color:var(--fg); }
  .principle b { color:var(--accent); text-transform:uppercase; letter-spacing:.06em; font-size:11px; display:block; margin-bottom:4px; }
  .construct { margin:14px 0 2px; font-size:14.5px; color:var(--ink); }
  .construct b { color:var(--fg); }

  /* the complete source — every real file, embedded + copyable (self-contained, nothing fetched) */
  .sources { padding:54px 0 10px; border-top:1px solid var(--line); }
  .sources h2 { font-size:25px; letter-spacing:-.01em; margin:6px 0 14px; }
  .sources > p { color:var(--ink); margin-bottom:20px; max-width:640px; font-size:15.5px; }
  .srcfile { border:1px solid var(--line); border-radius:10px; margin:8px 0; overflow:hidden; background:var(--bg); }
  .srcfile > summary { cursor:pointer; padding:13px 16px; display:flex; align-items:center; justify-content:space-between; gap:12px; list-style:none; font-size:14px; color:var(--fg); }
  .srcfile > summary::-webkit-details-marker { display:none; }
  .srcfile > summary:hover { background:var(--paper); }
  .srcfile[open] > summary { border-bottom:1px solid var(--line); }
  .srcfile .srcmeta { color:var(--muted); font-size:12px; white-space:nowrap; }
  .srcfile .code { margin:0; border:none; border-radius:0; }

  footer.foot { padding:60px 0 90px; border-top:1px solid var(--line); color:var(--muted); font-size:14px; }
  footer.foot .enso { width:40px; height:40px; margin-bottom:18px; }
  footer.foot a { font-weight:600; }

  /* present mode */
  body.present .top-progress { display:block; }
  body.present .hero, body.present section.intro, body.present footer.foot, body.present .sources { display:none; }
  body.present .stage, body.present .coldopen { display:none; }
  body.present .stage.active, body.present .coldopen.active { display:block; min-height:78vh; padding-top:6vh; animation:fade .3s ease-out; }
  body.present .stage h2 { font-size:34px; }
  body.present .stage .concept { font-size:21px; }
  body.present .deep .code { display:none; }              /* keep slides crisp — extra code folds */
  body.present .deep .code:first-of-type { display:block; }  /* …but the stage's key code stays on screen */
  body.present .deep .how { font-size:17px; }
  @keyframes fade { from { opacity:0; transform:translateY(6px); } }
  .top-progress { display:none; height:2px; background:var(--line); position:sticky; top:60px; z-index:19; }
  .top-progress i { display:block; height:100%; background:var(--accent); transition:width .3s ease-out; }
  .navhint { display:none; }
  body.present .navhint { display:flex; position:fixed; bottom:22px; left:0; right:0; justify-content:center; gap:18px; color:var(--muted); font-size:12px; letter-spacing:.06em; }
  body.present .navhint kbd { border:1px solid var(--line); border-radius:5px; padding:1px 7px; font-family:inherit; }
</style>

  <script id="enso-sources" type="application/json">{"files":[{"path":"index.html","label":"the board — the whole UI + client logic","lang":"html","code":"\u003c!DOCTYPE html>\n\u003chtml lang=\"en\">\n\u003chead>\n\u003cmeta charset=\"utf-8\">\n\u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n\u003ctitle>Board\u003c/title>\n\u003clink rel=\"icon\" href=\"data:,\">\n\u003cstyle>\n  :root {\n    --bg: #fbfbfa;\n    --fg: #1a1a1a;\n    --ink: #181410;          /* sumi black — the ensō brush (warm near-black, not flat) */\n    --muted: #9b9b97;\n    --line: #ececea;\n    --accent: #e8553e;\n    --tint: rgba(232, 85, 62, 0.06); /* accent at rest — \"drop here\" */\n  }\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n\n  body {\n    background: var(--bg);\n    color: var(--fg);\n    font: 16px/1.5 -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif;\n    -webkit-font-smoothing: antialiased;\n    display: flex;\n    justify-content: center;\n    padding: 14vh 24px;\n    transition: background 0.2s ease-out, color 0.2s ease-out;  /* a calm fade on any palette change */\n  }\n\n  main { width: 100%; max-width: 840px; padding-bottom: 96px; } /* clear the chat bar */\n\n  header {\n    display: flex;\n    align-items: flex-start;\n    justify-content: space-between;\n    margin-bottom: 36px;\n  }\n  h1 {\n    font-size: 13px;\n    font-weight: 600;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    color: var(--muted);\n  }\n  .foot {\n    margin-top: 64px;\n    font-size: 13px;\n    color: var(--muted);\n    opacity: 0.7;\n  }\n  /* the report, collapsed to one quiet line: appears only when all work has settled */\n  .settled {\n    font-size: 13px;\n    color: var(--muted);\n    margin-top: 8px;\n    min-height: 1.5em; /* hold the space so the header never jumps */\n    opacity: 0;\n    transition: opacity 0.2s ease-out;\n  }\n  .settled.show { opacity: 0.8; }\n\n  /* one quiet way out — to the closing report for this cycle */\n  .cycle {\n    display: inline-block;\n    margin-top: 32px;\n    font-size: 13px;\n    color: var(--muted);\n    text-decoration: none;\n    transition: color 0.15s ease-out;\n  }\n  .cycle:hover { color: var(--accent); }\n\n  /* the right rail: the ensō rests at the header's edge, with breathing room on its right */\n  .rail { display: flex; align-items: center; gap: 16px; margin-right: 12px; }\n\n  /* ensō — a real calligraphic brush stroke: a FILLED silhouette with variable width (thick belly,\n     thin tapered tail) + an open mouth. NOT a constant-width stroked ring (a stroke can't taper).\n     Same brush math as the video (motion/src/Enso.tsx). Progress reveals the ink by masking the\n     silhouette with a widening centerline stroke — so `arc`'s stroke-dasharray still drives it. */\n  .enso { width: 30px; height: 30px; flex: none; overflow: visible; }\n  .enso .track { fill: var(--line); opacity: .4; }\n  .enso .ink   { fill: url(#ensoInk); }\n  .enso .arc   { fill: none; stroke: #fff; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; transition: stroke-dasharray 0.25s ease-out; }\n  /* the live frontier — a red wet brush edge + a spark where the gauge is drawing; pulses while a build runs */\n  .enso .warc  { fill: none; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; transition: stroke-dasharray 0.25s ease-out, stroke-dashoffset 0.25s ease-out; }\n  .enso .wet   { fill: var(--accent); }\n  .enso .glow  { fill: var(--accent); transition: opacity 0.3s ease-out; }\n  .enso .spark { fill: #fff4e8; transition: opacity 0.3s ease-out; }\n  .enso.building .spark { animation: sparkpulse 1.15s ease-in-out infinite; }\n  .enso.building .glow  { animation: glowpulse 1.15s ease-in-out infinite; }\n  @keyframes sparkpulse { 0%, 100% { opacity: .95 } 50% { opacity: .5 } }\n  @keyframes glowpulse  { 0%, 100% { opacity: .5 } 50% { opacity: .2 } }\n\n  .board {\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n    gap: 28px;\n  }\n  .col { padding-left: 28px; border-left: 1px solid var(--line); transition: background 0.18s ease-out; }\n  .col:first-child { padding-left: 0; border-left: none; }\n  .col.over { background: var(--tint); border-radius: 6px; }\n\n  h2 {\n    font-size: 13px;\n    font-weight: 600;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    color: var(--muted);\n    margin-bottom: 16px;\n    display: flex;\n    gap: 8px;\n  }\n  h2 .count { font-weight: 400; opacity: 0.7; }\n  /* a quiet colour identity per column — the one place colour earns its keep (flow at a glance) */\n  .col h2::before { content: \"\"; width: 7px; height: 7px; border-radius: 50%; flex: none; align-self: center; background: #c2c6cd; }\n  .col[data-status=\"doing\"] h2::before { background: #d99a2b; }   /* in motion — warm amber */\n  .col[data-status=\"done\"]  h2::before { background: #6aa84f; }   /* settled — calm green */\n\n  ul { list-style: none; }\n\n  @keyframes enter {\n    from { opacity: 0; transform: translateY(-4px); }\n    to   { opacity: 1; transform: none; }\n  }\n\n  .card {\n    display: flex;\n    align-items: center;\n    gap: 12px;\n    padding: 12px 0;\n    border-bottom: 1px solid var(--line);\n    cursor: grab;\n    overflow: hidden;\n    animation: enter 0.18s ease-out;\n    transition: max-height 0.18s ease-out, padding 0.18s ease-out, opacity 0.18s ease-out;\n  }\n  .card:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }\n  .card.dragging { opacity: 0.45; cursor: grabbing; } /* calm cue, no shadow */\n  .card.leaving { opacity: 0; padding-block: 0; }\n\n  .text { flex: 1; word-break: break-word; }\n  .card[data-status=\"done\"] .text { color: var(--muted); text-decoration: line-through; }\n\n  /* a quiet category tag — hairline pill, muted, never competes with the accent */\n  .chip {\n    flex: none;\n    font-size: 11px;\n    letter-spacing: 0.08em;\n    text-transform: uppercase;\n    color: var(--muted);\n    border: 1px solid var(--line);\n    border-radius: 100px;\n    padding: 2px 8px;\n  }\n\n  .delete {\n    flex: none;\n    display: flex;\n    border: none;\n    background: none;\n    color: var(--muted);\n    padding: 0;\n    cursor: pointer;\n    opacity: 0;\n    transition: opacity 0.15s, color 0.15s;\n  }\n  .card:hover .delete, .delete:focus-visible { opacity: 1; }\n  .delete:hover { color: var(--accent); }\n  .delete:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }\n  .delete svg { display: block; width: 14px; height: 14px; }\n  .delete path { fill: none; stroke: currentColor; stroke-width: 1.25; stroke-linecap: round; }\n\n  .empty {\n    color: var(--muted);\n    font-size: 14px;\n    opacity: 0.65;\n    padding: 12px 0;\n    line-height: 1.6;\n  }\n\n  /* the chat — a single calm line pinned at the foot of the page; the one way in */\n  /* the build dock: only the agent's reasoning stream, bottom-centred, invisible when idle */\n  #dock {\n    position: fixed;\n    left: 0; right: 0; bottom: 0;\n    display: flex; flex-direction: column; align-items: center; gap: 10px;\n    padding: 0 24px 26px;\n    pointer-events: none;\n  }\n  /* quick-add lives in the Todo column, as its first item: type a task, press Enter */\n  .quickadd {\n    width: 100%;\n    margin: 2px 0 16px;\n    border: none;\n    border-bottom: 1px solid var(--line);\n    background: none;\n    font: inherit;\n    font-size: 15px;\n    color: var(--fg);\n    padding: 9px 2px;\n    transition: border-color 0.18s ease-out;\n  }\n  .quickadd::placeholder { color: var(--muted); }\n  .quickadd:focus { outline: none; border-bottom-color: var(--accent); }\n\n  /* while the agent works, an open ensō turns slowly — never a spinner bar */\n  #working { width: 24px; height: 24px; }\n  #working .arc { stroke-dasharray: 14 80; }   /* a short turning segment along the calligraphic ring */\n  #working[hidden] { display: none; }\n  .turning { animation: turn 2.4s linear infinite; }\n  @keyframes turn { to { transform: rotate(360deg); } }\n\n  /* the reasoning stream — a calm, readable panel (the agent thinking out loud), Cowork-style */\n  #feed { width: 100%; max-width: 720px; display: flex; flex-direction: column;\n    background: var(--bg); border: 1px solid var(--line); border-radius: 12px; padding: 16px 22px 18px; }\n  #feed.hidden { display: none; }\n\n  /* the header: a pulsing dot · a shimmering status · a live elapsed timer */\n  .fhead { display: flex; align-items: center; gap: 10px; padding-bottom: 12px; margin-bottom: 12px;\n    border-bottom: 1px solid var(--line); }\n  .fdot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex: none;\n    animation: pulse 1.5s ease-in-out infinite; }\n  .fstatus { font-size: 13px; font-weight: 600; letter-spacing: 0.02em; color: var(--fg); }\n  /* the signature shimmer — a sheen sweeping across the word while the agent is live */\n  .fstatus.live { background: linear-gradient(100deg, var(--muted) 36%, var(--fg) 50%, var(--muted) 64%);\n    background-size: 220% 100%; -webkit-background-clip: text; background-clip: text; color: transparent;\n    animation: shimmer 1.7s linear infinite; }\n  .ftime { margin-left: auto; font-size: 12.5px; color: var(--muted); font-variant-numeric: tabular-nums; }\n  .fdot.rest { animation: none; background: var(--muted); }   /* settled — the pulse stills */\n\n  .fsteps { display: flex; flex-direction: column; gap: 7px; }\n  #feed .s { font-size: 15px; line-height: 1.55; color: var(--fg); opacity: .92; border-radius: 6px;\n    animation: rise .32s cubic-bezier(0.22,1,0.36,1), flash 1.1s ease-out;\n    transition: opacity .45s ease-out, transform .45s ease-out; }\n  #feed .s.reason { font-style: italic; color: var(--muted); }          /* reasoning, softer than narration */\n  #feed .s.tool { font-family: \"SF Mono\", ui-monospace, Menlo, monospace; font-size: 13.5px; color: var(--fg); }\n  #feed .s.tool::before { content: \"\"; display: inline-block; width: 7px; height: 7px; border-radius: 50%;\n    background: var(--accent); margin-right: 9px; vertical-align: 1px; }       /* the one accent — a tool call */\n  #feed .s.leaving { opacity: 0; transform: translateY(-4px); }              /* steps fade OUT, never snap */\n  #feed.fading { opacity: 0; transition: opacity .45s ease-out; }\n  @keyframes rise { from { opacity: 0; transform: translateY(4px); } }  /* fade IN, ends at the .9 rest state */\n  @keyframes shimmer { to { background-position: -220% 0; } }\n  @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .35; transform: scale(.72); } }\n  @keyframes flash { from { background: var(--tint); } to { background: transparent; } }  /* a brief warm flash as each line lands */\n  @media (prefers-reduced-motion: reduce) { .fstatus.live, .fdot, #feed .s { animation: none; } }\n\n  .sr-only {\n    position: absolute;\n    width: 1px; height: 1px;\n    margin: -1px; padding: 0;\n    overflow: hidden;\n    clip: rect(0 0 0 0);\n    white-space: nowrap;\n    border: 0;\n  }\n\n  @media (max-width: 640px) {\n    .board { grid-template-columns: 1fr; gap: 36px; }\n    .col { padding-left: 0; border-left: none; }\n  }\n\u003c/style>\n\u003c/head>\n\u003cbody>\n  \u003cmain>\n    \u003cheader>\n      \u003cdiv>\n        \u003ch1>Today\u003c/h1>\n        \u003cp class=\"settled\" id=\"settled\" aria-live=\"polite\">\u003c/p>\n      \u003c/div>\n      \u003cdiv class=\"rail\">\n        \u003csvg class=\"enso\" viewBox=\"0 0 36 36\" role=\"img\" aria-label=\"0 of 0 done\">\n          \u003cdefs>\n            \u003clinearGradient id=\"ensoInk\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\">\n              \u003cstop offset=\"0\" stop-color=\"var(--ink)\"/>\n              \u003cstop offset=\"0.72\" stop-color=\"var(--ink)\"/>\n              \u003cstop offset=\"1\" stop-color=\"var(--ink)\" stop-opacity=\"0.18\"/>\n            \u003c/linearGradient>\n            \u003c!-- the brush silhouette (variable width, tapered tail, open mouth) — shared by header + working -->\n            \u003cpath id=\"ensoFill\" d=\"M 30.62 13.39 L 30.54 12.85 L 30.37 12.35 L 30.14 11.86 L 29.87 11.40 L 29.56 10.96 L 29.23 10.54 L 28.87 10.14 L 28.50 9.76 L 28.12 9.40 L 27.73 9.05 L 27.34 8.70 L 26.95 8.36 L 26.55 8.03 L 26.16 7.69 L 25.76 7.36 L 25.35 7.04 L 24.94 6.71 L 24.52 6.40 L 24.09 6.09 L 23.64 5.80 L 23.18 5.53 L 22.71 5.28 L 22.22 5.06 L 21.72 4.86 L 21.21 4.68 L 20.69 4.54 L 20.16 4.42 L 19.62 4.33 L 19.08 4.26 L 18.54 4.21 L 18.00 4.18 L 17.46 4.16 L 16.91 4.16 L 16.36 4.17 L 15.81 4.20 L 15.25 4.24 L 14.70 4.29 L 14.14 4.36 L 13.58 4.45 L 13.03 4.56 L 12.47 4.69 L 11.92 4.86 L 11.38 5.05 L 10.85 5.27 L 10.32 5.52 L 9.82 5.80 L 9.32 6.10 L 8.85 6.44 L 8.39 6.79 L 7.95 7.17 L 7.52 7.57 L 7.11 7.98 L 6.71 8.41 L 6.33 8.85 L 5.96 9.30 L 5.60 9.76 L 5.26 10.24 L 4.93 10.73 L 4.62 11.23 L 4.33 11.75 L 4.07 12.28 L 3.84 12.83 L 3.65 13.39 L 3.50 13.97 L 3.39 14.55 L 3.32 15.14 L 3.30 15.73 L 3.33 16.32 L 3.40 16.91 L 3.51 17.49 L 3.65 18.06 L 3.81 18.62 L 4.00 19.17 L 4.19 19.70 L 4.40 20.22 L 4.60 20.74 L 4.79 21.24 L 4.97 21.75 L 5.14 22.25 L 5.30 22.76 L 5.44 23.28 L 5.58 23.81 L 5.72 24.34 L 5.87 24.89 L 6.02 25.44 L 6.20 25.99 L 6.40 26.54 L 6.63 27.08 L 6.90 27.60 L 7.20 28.11 L 7.55 28.59 L 7.93 29.04 L 8.35 29.45 L 8.80 29.83 L 9.28 30.17 L 9.79 30.48 L 10.32 30.75 L 10.85 30.98 L 11.40 31.19 L 11.96 31.37 L 12.51 31.54 L 13.07 31.68 L 13.63 31.81 L 14.19 31.93 L 14.75 32.04 L 15.31 32.13 L 15.87 32.22 L 16.43 32.28 L 17.00 32.32 L 17.56 32.34 L 18.13 32.34 L 18.69 32.30 L 19.25 32.23 L 19.80 32.12 L 20.35 31.98 L 20.88 31.81 L 21.40 31.60 L 21.91 31.36 L 22.40 31.10 L 22.87 30.81 L 23.32 30.50 L 23.76 30.18 L 24.19 29.85 L 24.60 29.51 L 25.01 29.17 L 25.40 28.83 L 25.78 28.48 L 26.16 28.13 L 26.53 27.77 L 26.89 27.41 L 27.24 27.04 L 27.57 26.66 L 27.90 26.26 L 28.20 25.86 L 28.49 25.44 L 28.75 25.00 L 28.99 24.56 L 29.19 24.10 L 29.37 23.63 L 29.49 23.13 L 29.23 23.02 L 28.92 23.40 L 28.62 23.79 L 28.31 24.15 L 27.98 24.50 L 27.63 24.83 L 27.26 25.13 L 26.87 25.41 L 26.48 25.67 L 26.09 25.91 L 25.69 26.14 L 25.29 26.36 L 24.90 26.57 L 24.52 26.78 L 24.15 27.00 L 23.78 27.22 L 23.42 27.46 L 23.07 27.70 L 22.71 27.96 L 22.35 28.21 L 21.98 28.47 L 21.60 28.73 L 21.21 28.98 L 20.80 29.21 L 20.38 29.42 L 19.95 29.59 L 19.50 29.73 L 19.04 29.84 L 18.57 29.89 L 18.10 29.91 L 17.64 29.88 L 17.17 29.81 L 16.71 29.71 L 16.27 29.57 L 15.83 29.40 L 15.41 29.21 L 14.99 29.00 L 14.59 28.77 L 14.20 28.54 L 13.83 28.30 L 13.46 28.06 L 13.09 27.81 L 12.74 27.56 L 12.39 27.30 L 12.05 27.04 L 11.72 26.77 L 11.40 26.49 L 11.09 26.20 L 10.80 25.90 L 10.52 25.58 L 10.25 25.26 L 10.00 24.92 L 9.77 24.57 L 9.56 24.21 L 9.36 23.85 L 9.17 23.48 L 9.00 23.11 L 8.84 22.73 L 8.68 22.36 L 8.54 21.98 L 8.40 21.60 L 8.26 21.22 L 8.13 20.84 L 8.00 20.45 L 7.89 20.06 L 7.78 19.67 L 7.69 19.27 L 7.62 18.86 L 7.57 18.46 L 7.54 18.05 L 7.53 17.63 L 7.54 17.22 L 7.58 16.81 L 7.65 16.40 L 7.73 16.00 L 7.83 15.60 L 7.94 15.20 L 8.06 14.81 L 8.19 14.42 L 8.33 14.03 L 8.46 13.64 L 8.60 13.25 L 8.73 12.85 L 8.87 12.44 L 9.01 12.03 L 9.16 11.61 L 9.32 11.19 L 9.50 10.77 L 9.70 10.36 L 9.92 9.96 L 10.17 9.57 L 10.46 9.20 L 10.77 8.87 L 11.12 8.56 L 11.49 8.30 L 11.90 8.08 L 12.32 7.90 L 12.77 7.76 L 13.22 7.67 L 13.68 7.61 L 14.14 7.58 L 14.60 7.58 L 15.06 7.59 L 15.50 7.62 L 15.93 7.65 L 16.36 7.67 L 16.78 7.69 L 17.19 7.70 L 17.59 7.69 L 18.00 7.67 L 18.41 7.64 L 18.82 7.61 L 19.24 7.57 L 19.66 7.53 L 20.09 7.51 L 20.53 7.49 L 20.97 7.50 L 21.41 7.53 L 21.85 7.59 L 22.29 7.67 L 22.72 7.79 L 23.15 7.93 L 23.56 8.10 L 23.97 8.29 L 24.37 8.50 L 24.77 8.72 L 25.15 8.96 L 25.54 9.21 L 25.92 9.47 L 26.30 9.74 L 26.68 10.01 L 27.07 10.29 L 27.46 10.58 L 27.84 10.89 L 28.23 11.21 L 28.61 11.54 L 28.97 11.90 L 29.33 12.27 L 29.67 12.66 L 30.00 13.08 L 30.35 13.49 Z\"/>\n            \u003cmask id=\"ensoReveal\">\u003cpath class=\"arc\" d=\"M 30.49 13.44 L 30.27 12.96 L 30.02 12.51 L 2 linejoin=\"round\"/>\u003c/mask>\n          \u003c/defs>\n          \u003cuse href=\"#ensoFill\" class=\"track\"/>\n          \u003cuse href=\"#ensoFill\" class=\"ink\" mask=\"url(#ensoReveal)\"/>\n          \u003cuse href=\"#ensoFill\" class=\"wet\" mask=\"url(#ensoWet)\"/>\n          \u003ccircle class=\"glow\" r=\"3.5\" opacity=\"0\"/>\n          \u003ccircle class=\"spark\" r=\"1.6\" opacity=\"0\"/>\n        \u003c/svg>\n      \u003c/div>\n    \u003c/header>\n\n    \u003cdiv class=\"board\" id=\"board\">\u003c/div>\n\n    \u003cp class=\"sr-only\" id=\"announce\" aria-live=\"polite\">\u003c/p>\n    \u003cp class=\"sr-only\" id=\"hint\">\n      To move a card, focus it and press the left or right arrow. Press Delete to remove it.\n    \u003c/p>\n\n    \u003cfooter class=\"foot\">built live with Claude\u003c/footer>\n  \u003c/main>\n\n  \u003c!-- the dock: only the agent's reasoning stream + the working ensō. No input — adding happens in the Todo column. -->\n  \u003cdiv id=\"dock\">\n    \u003cdiv id=\"feed\" class=\"hidden\" aria-live=\"polite\">\u003c/div>\n    \u003csvg id=\"working\" class=\"enso turning\" viewBox=\"0 0 36 36\" role=\"img\" aria-label=\"working\" hidden>\n      \u003cdefs>\u003cmask id=\"workReveal\">\u003cpath class=\"arc\" d=\"M 30.49 13.44 L 30.27 12.96 L 30.02 12.51 L 29.74 12.07 L 29.42 11.65 L 29.08 11.25 L 28.73 10.87 L 28.36 10.52 L 27.98 10.17 L 27.60 9.85 L 27.21 9.53 L 26.82 9.22 L 26.43 8.92 L 26.04 8.62 L 25.65 8.33 L 25.26 8.04 L 24.86 7.77 L 24.46 7.50 L 24.04 7.25 L 23.62 7.01 L 23.18 6.80 L 22.74 6.60 L 22.28 6.44 L 21.82 6.29 L 21.34 6.18 L 20.87 6.09 L 20.39 6.02 L 19.91 5.98 L 19.43 5.95 L 18.95 5.93 L 18.48 5.93 L 18.00 5.92 L 17.52 5.93 L 17.05 5.93 L 16.57 5.93 L 16.08 5.94 L 15.59 5.94 L 15.10 5.95 L 14.60 5.98 L 14.09 6.01 L 13.59 6.07 L 13.08 6.15 L 12.57 6.26 L 12.07 6.40 L 11.58 6.58 L 11.11 6.80 L 10.66 7.05 L 10.22 7.33 L 9.81 7.65 L 9.42 8.00 L 9.06 8.37 L 8.72 8.76 L 8.40 9.17 L 8.11 9.59 L 7.82 10.02 L 7.56 10.46 L 7.31 10.90 L 7.06 11.34 L 6.83 11.79 L 6.61 12.24 L 6.40 12.70 L 6.20 13.16 L 6.02 13.63 L 5.86 14.10 L 5.72 14.58 L 5.61 15.07 L 5.53 15.57 L 5.47 16.07 L 5.46 16.57 L 5.47 17.07 L 5.52 17.56 L 5.59 18.05 L 5.69 18.54 L 5.81 19.02 L 5.94 19.48 L 6.09 19.95 L 6.24 20.40 L 6.40 20.85 L 6.55 21.29 L 6.70 21.74 L 6.85 22.18 L 6.99 22.63 L 7.13 23.08 L 7.28 23.54 L 7.43 24.00 L 7.60 24.46 L 7.78 24.92 L 7.98 25.38 L 8.20 25.82 L 8.45 26.26 L 8.73 26.68 L 9.03 27.09 L 9.36 27.47 L 9.72 27.83 L 10.10 28.16 L 10.50 28.47 L 10.92 28.76 L 11.35 29.02 L 11.80 29.27 L 12.25 29.50 L 12.71 29.72 L 13.17 29.92 L 13.64 30.11 L 14.11 30.29 L 14.59 30.46 L 15.08 30.62 L 15.57 30.77 L 16.07 30.89 L 16.57 30.99 L 17.08 31.07 L 17.60 31.11 L 18.12 31.12 L 18.63 31.10 L 19.14 31.03 L 19.65 30.93 L 20.15 30.79 L 20.63 30.61 L 21.10 30.40 L 21.56 30.17 L 22.00 29.91 L 22.42 29.64 L 22.84 29.36 L 23.24 29.07 L 23.63 28.78 L 24.01 28.49 L 24.40 28.20 L 24.77 27.91 L 25.15 27.63 L 25.53 27.35 L 25.91 27.06 L 26.29 26.77 L 26.66 26.47 L 27.03 26.16 L 27.39 25.84 L 27.73 25.49 L 28.06 25.13 L 28.36 24.75 L 28.65 24.36 L 28.91 23.94 L 29.15 23.51 L 29.36 23.07\"/>\u003c/mask>\u003c/defs>\n      \u003cuse href=\"#ensoFill\" class=\"track\"/>\n      \u003cuse href=\"#ensoFill\" class=\"ink\" mask=\"url(#workReveal)\"/>\n    \u003c/svg>\n  \u003c/div>\n\n\u003cscript>\n  const ORDER = [\"todo\", \"doing\", \"done\"];\n  const COLUMNS = [\n    { id: \"todo\",  title: \"Todo\",  empty: \"Type above to add the first thing.\" },\n    { id: \"doing\", title: \"Doing\", empty: \"Nothing in motion yet.\" },\n    { id: \"done\",  title: \"Done\",  empty: \"Finished work settles here.\" },\n  ];\n  const label = id => COLUMNS.find(c => c.id === id).title;\n\n  let cards = [];               // the model, mirrored from the server\n  const nodes = new Map();      // id -> { li, text } so we can update in place and keep focus\n  const col = {};               // status -> { list, empty, count }\n  let dragged = null;           // id of the card being dragged\n\n  const board = document.getElementById(\"board\");\n  const announce = document.getElementById(\"announce\");\n  const settled = document.getElementById(\"settled\");\n  const enso = document.querySelector(\"header .enso\");\n  const arc = enso.querySelector(\".arc\");\n  const track = enso.querySelector(\".track\");\n  const warc = enso.querySelector(\".warc\");          // the wet edge rides the same centreline as the reveal\n  const spark = enso.querySelector(\".spark\");\n  const glow = enso.querySelector(\".glow\");\n  warc.setAttribute(\"d\", arc.getAttribute(\"d\"));\n\n  // ── server: the board lives there, not in localStorage ────────────────────\n\n  let pending = 0; // outstanding writes; pause polling so a fresh GET can't clobber a local edit\n\n  async function putBoard() {\n    pending++;\n    try {\n      await fetch(\"/board\", {\n        method: \"POST\",\n        headers: { \"content-type\": \"application/json\" },\n        body: JSON.stringify({ cards }),\n      });\n    } finally { pending--; }\n  }\n\n  let lastRaw = \"\";\n  async function pull() {\n    if (pending) return;\n    try {\n      const raw = await (await fetch(\"/board\")).text();\n      if (raw === lastRaw) return;          // nothing changed — don't re-render or steal focus\n      lastRaw = raw;\n      cards = JSON.parse(raw).cards;\n      render();\n    } catch {}\n  }\n\n  // A local change: reflect it at once, then persist. (Quick-add is plain client-side; the AGENT builds a card via drag-to-Doing.)\n  function commit() { render(); putBoard(); }\n  function remove(id) { cards = cards.filter(c => c.id !== id); commit(); }\n\n  function shift(id, dir) {\n    const card = cards.find(c => c.id === id);\n    const next = card && ORDER[ORDER.indexOf(card.status) + dir];\n    if (!next) return;\n    card.status = next;\n    commit();\n    say(card, next);\n    nodes.get(id)?.li.focus();\n    if (next === \"doing\") buildCard(card);     // moving into Doing is the only thing that starts the agent\n  }\n\n  // Drop a card into a column, before `beforeId` (or at the end if null).\n  // Reordering `cards` makes the column order — and the persisted order — follow the drop.\n  function drop(id, status, beforeId) {\n    const card = cards.find(c => c.id === id);\n    if (!card) return;\n    const moved = card.status !== status;\n    card.status = status;\n    cards = cards.filter(c => c.id !== id);\n    const i = beforeId ? cards.findIndex(c => c.id === beforeId) : -1;\n    i \u003c 0 ? cards.push(card) : cards.splice(i, 0, card);\n    commit();\n    if (moved) say(card, status);\n    if (moved && status === \"doing\") buildCard(card);   // drag into Doing → the agent builds that one card\n  }\n\n  // The card to drop before: the first whose midpoint sits below the cursor (null → append at end).\n  function afterCard(list, y) {\n    for (const li of list.querySelectorAll(\".card:not(.dragging)\")) {\n      const box = li.getBoundingClientRect();\n      if (y \u003c box.top + box.height / 2) return li;\n    }\n    return null;\n  }\n\n  // ── building the board ─────────────────────────────────────────────────────\n\n  // Build one column's DOM and wire it as a drop target.\n  function buildColumn(spec) {\n    const section = document.createElement(\"section\");\n    section.className = \"col\";\n    section.dataset.status = spec.id;   // todo | doing | done — for the column's colour identity\n\n    const h2 = document.createElement(\"h2\");\n    h2.textContent = spec.title;\n    const count = document.createElement(\"span\");\n    count.className = \"count\";\n    h2.append(count);\n\n    const list = document.createElement(\"ul\");\n    list.setAttribute(\"role\", \"list\");\n    list.setAttribute(\"aria-label\", spec.title);\n    const empty = document.createElement(\"p\");\n    empty.className = \"empty\";\n    empty.textContent = spec.empty;\n    section.append(h2, list, empty);\n\n    // Quick-add: only the Todo column. The input is the column's FIRST item — type, Enter, a card appears.\n    // Plain client-side; no agent runs here. (Building happens later, when a card is dragged to Doing.)\n    if (spec.id === \"todo\") {\n      const add = document.createElement(\"input\");\n      add.className = \"quickadd\";\n      add.placeholder = \"add a task — press Enter\";\n      add.setAttribute(\"aria-label\", \"Add a task to Todo\");\n      add.addEventListener(\"keydown\", e => {\n        if (e.key !== \"Enter\") return;\n        const text = add.value.trim();\n        if (!text) return;\n        add.value = \"\";\n        const id = (cards.reduce((m, c) => Math.max(m, +c.id || 0), 0) + 1);\n        cards.unshift({ id, text, status: \"todo\" });   // newest sits at the top of Todo\n        commit();\n      });\n      section.insertBefore(add, list);                 // sits above the cards, as the first thing in the column\n    }\n\n    section.addEventListener(\"dragover\", e => {\n      e.preventDefault();\n      section.classList.add(\"over\");\n      const li = dragged && nodes.get(dragged)?.li;        // open the gap live, where it will land\n      if (!li) return;\n      const before = afterCard(list, e.clientY);\n      before ? list.insertBefore(li, before) : list.append(li);\n    });\n    section.addEventListener(\"dragleave\", e => {\n      if (!section.contains(e.relatedTarget)) section.classList.remove(\"over\");\n    });\n    section.addEventListener(\"drop\", e => {\n      e.preventDefault();\n      section.classList.remove(\"over\");\n      if (!dragged) return;\n      const li = nodes.get(dragged).li;                    // dragover already placed it — read its neighbour\n      drop(dragged, spec.id, li.nextElementSibling?.dataset.id || null);\n    });\n\n    board.append(section);\n    col[spec.id] = { list, empty, count };\n  }\n\n  // A single card's DOM. Handlers act by stable id, so live polling can't stale them out.\n  function create(card) {\n    const id = card.id;\n    const li = document.createElement(\"li\");\n    li.className = \"card\";\n    li.dataset.id = id;\n    li.draggable = true;\n    li.tabIndex = 0;\n    li.setAttribute(\"role\", \"listitem\");\n    li.setAttribute(\"aria-roledescription\", \"Movable card\");\n\n    const text = document.createElement(\"span\");\n    text.className = \"text\";\n    text.textContent = card.text;\n\n    const del = document.createElement(\"button\");\n    del.className = \"delete\";\n    del.setAttribute(\"aria-label\", \"Delete card\");\n    del.innerHTML = '\u003csvg viewBox=\"0 0 14 14\" aria-hidden=\"true\">\u003cpath d=\"M3.5 3.5l7 7M10.5 3.5l-7 7\"/>\u003c/svg>';\n    del.onclick = () => remove(id);\n\n    li.addEventListener(\"dragstart\", () => { dragged = id; li.classList.add(\"dragging\"); });\n    li.addEventListener(\"dragend\", () => { dragged = null; li.classList.remove(\"dragging\"); render(); });\n\n    li.addEventListener(\"keydown\", e => {\n      if (e.key === \"ArrowRight\") { e.preventDefault(); shift(id, 1); }\n      else if (e.key === \"ArrowLeft\") { e.preventDefault(); shift(id, -1); }\n      else if (e.key === \"Delete\" || e.key === \"Backspace\") { e.preventDefault(); remove(id); }\n    });\n\n    li.append(text);\n    if (card.label) {\n      const chip = document.createElement(\"span\");\n      chip.className = \"chip\";\n      chip.textContent = card.label;\n      li.append(chip);\n    }\n    li.append(del);\n    return { li, text };\n  }\n\n  function say(card, status) {\n    announce.textContent = `Moved “${card.text}” to ${label(status)}.`;\n  }\n\n  function paint(li, card) {\n    li.dataset.status = card.status;\n    li.setAttribute(\"aria-label\", `${card.text}, ${label(card.status)}`);\n  }\n\n  function leave(li) {\n    li.style.maxHeight = li.offsetHeight + \"px\";\n    li.classList.add(\"leaving\");\n    requestAnimationFrame(() => { li.style.maxHeight = \"0\"; });\n    li.addEventListener(\"transitionend\", () => li.remove(), { once: true });\n  }\n\n  // The ensō closes as work completes; the brush's open gap is in the path itself (top-right).\n  const C = arc.getTotalLength();          // the calligraphic ring's true length (it isn't a perfect circle)\n  track.style.strokeDasharray = \"none\";    // the track shows the whole open ring; the arc fills over it\n\n  function paintEnso() {\n    const done = cards.filter(c => c.status === \"done\").length;\n    const frac = cards.length ? done / cards.length : 0;\n    arc.style.strokeDasharray = `${frac * C} ${C}`;\n    enso.setAttribute(\"aria-label\", `${done} of ${cards.length} done`);\n    // the live frontier: a red wet edge + a spark where the brush is — shown while there's a partial\n    // frontier OR a build is running; at empty/complete the mark rests, pure black.\n    const drawing = enso.classList.contains(\"building\");\n    if ((frac > 0.001 && frac \u003c 0.999) || drawing) {\n      const tip = Math.max(frac, drawing ? 0.06 : 0) * C;\n      const lead = Math.min(0.12 * C, tip);\n      warc.style.strokeDasharray = `${lead} ${C}`;\n      warc.style.strokeDashoffset = `${lead - tip}`;          // place the dash so it ENDS at the frontier\n      const p = arc.getPointAtLength(tip);\n      for (const el of [spark, glow]) { el.setAttribute(\"cx\", p.x.toFixed(2)); el.setAttribute(\"cy\", p.y.toFixed(2)); }\n      spark.style.opacity = drawing ? \"\" : \"0.95\";            // while drawing, the CSS pulse owns opacity\n      glow.style.opacity = drawing ? \"\" : \"0.5\";\n    } else {\n      warc.style.strokeDasharray = `0 ${C}`;\n      spark.style.opacity = \"0\"; glow.style.opacity = \"0\";\n    }\n    // the whole report, distilled to one quiet line\n    const allDone = cards.length > 0 && done === cards.length;\n    settled.textContent = allDone ? \"all settled.\" : \"\";\n    settled.classList.toggle(\"show\", allDone);\n  }\n\n  // The one update path: reconcile the DOM against `cards`, keyed by id.\n  function render() {\n    const live = new Set(cards.map(c => c.id));\n    for (const [id, node] of nodes)\n      if (!live.has(id)) { nodes.delete(id); leave(node.li); }\n    for (const { id: colId } of COLUMNS) {\n      const items = cards.filter(c => c.status === colId);\n      col[colId].empty.hidden = items.length > 0;\n      col[colId].count.textContent = items.length || \"\";\n      for (const card of items) {\n        let node = nodes.get(card.id);\n        if (!node) { node = create(card); nodes.set(card.id, node); }\n        if (node.text.textContent !== card.text) node.text.textContent = card.text;\n        paint(node.li, card);\n        col[colId].list.append(node.li); // append() moves an existing node into the right column, in order\n      }\n    }\n    paintEnso();\n  }\n\n  // ── the build stream: drag a card to Doing → the agent builds it, live ──────\n\n  const working = document.getElementById(\"working\");\n  const feed = document.getElementById(\"feed\");\n  let fSteps = null, fStatus = null, fTime = null, fDot = null, t0 = 0, ticker = null;\n\n  const fmt = ms => { const s = Math.round(ms / 1000); return s \u003c 60 ? s + \"s\" : Math.floor(s / 60) + \"m \" + String(s % 60).padStart(2, \"0\") + \"s\"; };\n\n  // open the panel with a Cowork-style header: a pulsing dot · a shimmering status · a live timer\n  function feedOpen() {\n    feed.classList.remove(\"hidden\", \"fading\");\n    feed.innerHTML =\n      '\u003cdiv class=\"fhead\">\u003cspan class=\"fdot\">\u003c/span>\u003cspan class=\"fstatus live\">Thinking\u003c/span>\u003cspan class=\"ftime\">0s\u003c/span>\u003c/div>' +\n      '\u003cdiv class=\"fsteps\">\u003c/div>';\n    fSteps = feed.querySelector(\".fsteps\");\n    fStatus = feed.querySelector(\".fstatus\");\n    fTime = feed.querySelector(\".ftime\");\n    fDot = feed.querySelector(\".fdot\");\n    t0 = Date.now();\n    clearInterval(ticker);\n    ticker = setInterval(() => { if (fTime) fTime.textContent = fmt(Date.now() - t0); }, 200);\n  }\n\n  // freeze the header on a verdict: stop the shimmer + the clock, name the outcome\n  function feedSettle(label) {\n    clearInterval(ticker);\n    if (fStatus) { fStatus.classList.remove(\"live\"); fStatus.textContent = label; }\n    if (fDot) fDot.classList.add(\"rest\");\n    if (fTime) fTime.textContent = fmt(Date.now() - t0);\n  }\n\n  function feedClose() {\n    feed.classList.add(\"fading\");\n    setTimeout(() => { feed.innerHTML = \"\"; feed.classList.remove(\"fading\"); feed.classList.add(\"hidden\"); }, 450);\n  }\n\n  const step = (text, kind) => {\n    if (kind === \"start\") return;          // 'thinking…' drives the header, not a feed line\n    if (!fSteps) return;\n    const el = document.createElement(\"div\");\n    el.className = \"s\" + (kind === \"tool\" ? \" tool\" : kind === \"reason\" ? \" reason\" : \"\");\n    el.textContent = text;\n    fSteps.append(el);\n    // keep ~6 visible; the oldest fades OUT gracefully, never snaps away\n    while (fSteps.querySelectorAll(\".s:not(.leaving)\").length > 6) {\n      const old = fSteps.querySelector(\".s:not(.leaving)\");\n      old.classList.add(\"leaving\");\n      old.addEventListener(\"transitionend\", () => old.remove(), { once: true });\n    }\n  };\n\n  let building = false;   // one build at a time; ignore a second drag mid-flight\n\n  // The ONLY place an agent runs: a card has entered Doing. Stream its reasoning,\n  // let the gate guard the commit, and when the code changes, reload so the new\n  // feature shows live — but only AFTER a beat, so the result is visible first.\n  async function buildCard(card) {\n    if (building) return;\n    building = true;\n    feedOpen();\n    working.hidden = false;\n    enso.classList.add(\"building\"); paintEnso();    // the gauge goes live — spark at the frontier\n    let reloadCode = false, blocked = false;\n    try {\n      const res = await fetch(\"/build\", {\n        method: \"POST\",\n        headers: { \"content-type\": \"application/json\" },\n        body: JSON.stringify({ id: card.id, text: card.text }),\n      });\n      const reader = res.body.getReader();\n      const dec = new TextDecoder();\n      let buf = \"\";\n      for (;;) {\n        const { value, done } = await reader.read();\n        if (done) break;\n        buf += dec.decode(value, { stream: true });\n        const chunks = buf.split(\"\\n\\n\");\n        buf = chunks.pop();\n        for (const c of chunks) {\n          const line = c.replace(/^data: /, \"\").trim();\n          if (!line) continue;\n          let ev; try { ev = JSON.parse(line); } catch { continue; }\n          if (ev.type === \"step\") { step(ev.text, ev.kind); if (/blocked/i.test(ev.text)) blocked = true; }\n          if (ev.type === \"done\") reloadCode = ev.reloadCode;\n        }\n      }\n    } catch (err) { step(\"build interrupted — card stays in Doing\", \"note\"); }\n    finally {\n      working.hidden = true;\n      enso.classList.remove(\"building\");              // the brush settles — pull() repaints the new frontier\n      feedSettle(reloadCode ? \"Built\" : blocked ? \"Blocked\" : \"Done\");   // name the verdict, freeze the clock\n      await pull();                                  // the card may have moved to Done\n      building = false;\n      if (reloadCode) {\n        setTimeout(() => location.reload(), 1100);   // let \"Built · 12s\" land, then bring in the new code live\n      } else {\n        setTimeout(feedClose, 2600);                 // let the verdict rest, then fade the panel out\n      }\n    }\n  }\n\n  // ── start ───────────────────────────────────────────────────────────────────\n\n  COLUMNS.forEach(buildColumn);\n  pull();\n  setInterval(pull, 1500);\n\u003c/script>\n\u003c/body>\n\u003c/html>\n"},{"path":"server.mjs","label":"the agent build loop (drag → claude -p → floor)","lang":"js","code":"// Ensō backend — the agent runs on DRAG-TO-DOING, not on chat.\n// Adding a task is a plain client-side quick-add (no agent). Dragging a card into Doing hits\n// POST /build, which spawns `claude -p --output-format stream-json` to implement that one task;\n// its thinking + tool calls stream to the browser; the gate guards the commit; on pass → Done.\nimport { createServer } from 'node:http'\nimport { spawn, execFileSync } from 'node:child_process'\nimport { readFile, writeFile } from 'node:fs/promises'\nimport { existsSync, readFileSync, writeFileSync, mkdirSync } from 'node:fs'\nimport { createInterface } from 'node:readline'\nimport { report } from './report.mjs'   // the cycle report lives in its own gated file\nimport { call } from './board-mcp.mjs'  // the board's tools — every board mutation goes through these\n\nconst PORT = process.env.PORT || 4173\nconst BOARD = new URL('./board.json', import.meta.url)\n\nconst send = (res, status, type, body) => {\n  res.writeHead(status, { 'content-type': type, 'cache-control': 'no-store' })\n  res.end(body)\n}\nconst body = (req) => new Promise((r) => { let d = ''; req.on('data', (c) => (d += c)); req.on('end', () => r(d)) })\n\n// The agent must do real work, so we tell it what it can touch and to keep the board in board.json.\n// Adding a task is a plain client-side quick-add (no agent). The agent runs ONLY when you drag a\n// card into Doing → the builder below. One agent action, one direction, no back-and-forth.\nconst BUILDER = (task) => `You are the Ensō builder, working inside this project directory.\nFirst read .agent/context.json — it grounds you in the files in play, the routes, the floor commands, and\nthe constraints (the spec, the constitution, the skill). Then implement EXACTLY this one task by editing\nindex.html (Edit/Write): \"${task}\".\nFollow .claude/skills/enso-design/SKILL.md (read it first); do the smallest real change that satisfies it.\nA deterministic gate guards the commit — honor its contract or the work is reverted: NO emoji, NO pure\n#fff/#000/#ffffff/#000000 (use the --bg/--fg tokens; for translucency use rgba() of a token's channels),\nkeep the --accent token, and keep the columns in a COLUMNS array declaring todo/doing/done.\nIf the task is ambiguous, DO NOT ask questions or wait for confirmation — make a sensible, minimal\nchoice and build it. Do NOT touch the board, board.json, server.mjs, or board-mcp.mjs. When done, stop.`\n\n// stream a `claude -p` child's reasoning + tool calls over SSE. onClose(touchedCode, safe) → reloadCode.\nfunction streamAgent(res, system, request, onClose) {\n  res.writeHead(200, { 'content-type': 'text/event-stream', 'cache-control': 'no-store', connection: 'keep-alive' })\n  let alive = true\n  const safe = (ev) => { if (!alive) return; try { res.write(`data: ${JSON.stringify(ev)}\\n\\n`) } catch { alive = false } } // never crash on write-after-close\n  safe({ type: 'step', kind: 'start', text: 'thinking…' })\n  const dir = new URL('.', import.meta.url)\n  // The agent runs unattended, so no human is there to approve edits. Default: skip the prompt — that's the\n  // demo's whole point (the deterministic FLOOR catches slop, not a human). SAFER real-repo path: set\n  // ENSO_ALLOWLIST=1 to pre-approve ONLY the file-edit tools (never arbitrary Bash), so it works without the\n  // dangerous flag — exactly what you'd do on a codebase you care about.\n  const perm = process.env.ENSO_ALLOWLIST ? ['--allowedTools', 'Edit,Write,Read'] : ['--dangerously-skip-permissions']\n  const cl = spawn('claude', ['-p', `${system}\\n\\nRequest: ${request}`, '--output-format', 'stream-json', '--verbose', '--mcp-config', '.mcp.json', ...perm],\n    { cwd: dir, stdio: ['ignore', 'pipe', 'pipe'] })\n  const timer = setTimeout(() => { try { cl.kill() } catch {} }, 600_000)   // 10 min — real builds can be slow\n  res.on('close', () => { alive = false; try { cl.kill() } catch {} })\n  let touchedCode = false\n  createInterface({ input: cl.stdout }).on('line', (line) => {\n    let ev; try { ev = JSON.parse(line) } catch { return }\n    if (ev.type !== 'assistant') return\n    for (const b of ev.message?.content ?? []) {\n      if (b.type === 'thinking' && b.thinking?.trim()) safe({ type: 'step', kind: 'reason', text: b.thinking.trim() })\n      if (b.type === 'text' && b.text.trim()) safe({ type: 'step', kind: 'think', text: b.text.trim() })\n      if (b.type === 'tool_use') {\n        const f = b.input?.file_path || b.input?.path || ''\n        if (/index\\.html/.test(f)) touchedCode = true\n        safe({ type: 'step', kind: 'tool', text: `${b.name}${f ? ' · ' + f.split('/').pop() : ''}` })\n      }\n    }\n  })\n  cl.stderr.on('data', (d) => safe({ type: 'step', kind: 'note', text: String(d).slice(0, 120) }))\n  cl.on('close', async () => {\n    clearTimeout(timer)\n    let reloadCode = false\n    try { reloadCode = await onClose(touchedCode, safe) } catch (e) { safe({ type: 'step', kind: 'note', text: 'post: ' + e.message }) }\n    safe({ type: 'done', reloadCode }); try { res.end() } catch {}\n  })\n  cl.on('error', (e) => { clearTimeout(timer); safe({ type: 'step', kind: 'note', text: 'agent error: ' + e.message }); safe({ type: 'done' }); try { res.end() } catch {} })\n}\n\n// Context-grounding: hand the agent a small artifact (the files in play, routes, floor, tools, constraints)\n// BEFORE it runs, so it isn't context-blind. This is the Spec-Kit \"Agents\" lesson, made concrete.\nfunction writeContext(card) {\n  const ctx = {\n    task: card.text,\n    files_in_play: ['index.html'],\n    do_not_touch: ['board.json', 'server.mjs', 'board-mcp.mjs', 'gate.mjs', 'test/'],\n    routes: { build: 'POST /build', board: 'GET/POST /board', report: 'GET /report' },\n    commit_floor: ['node gate.mjs', 'node --test'],\n    release_gate: ['node qa.mjs \u003cid>', 'node review.mjs \u003cid> \"\u003ctask>\"'],\n    mcp_tools: ['list_cards', 'add_card', 'move_card', 'seed', 'clean'],\n    constraints: { skill: '.claude/skills/enso-design/SKILL.md', constitution: 'constitution.md', spec: 'spec.md' },\n  }\n  try { mkdirSync(new URL('./.agent/', import.meta.url), { recursive: true }); writeFileSync(new URL('./.agent/context.json', import.meta.url), JSON.stringify(ctx, null, 2)) } catch {}\n}\n\n// BUILD = execute one card. COMMIT FLOOR (gate + tests) decides what lands; the RELEASE GATE (smoke +\n// receipt) decides what's promoted to Done. The card moves through the board tool (move_card), never a raw write.\nfunction build(card, res) {\n  const INDEX = new URL('./index.html', import.meta.url)\n  let snapshot = ''\n  try { snapshot = readFileSync(INDEX, 'utf8') } catch {}   // remember the file as-is, BEFORE the agent touches it\n  writeContext(card)                                         // ground the agent first\n  streamAgent(res, BUILDER(card.text), `Build this: ${card.text}`, async (touchedCode, safe) => {\n    const dir = new URL('.', import.meta.url)\n    // 1. THE COMMIT FLOOR — mechanical facts (gate) + behavior (tests). Either red → revert, hold the card.\n    try { execFileSync('node', ['gate.mjs'], { cwd: dir }); execFileSync('node', ['--test'], { cwd: dir }) }\n    catch {\n      try { writeFileSync(INDEX, snapshot) } catch {}   // restore the pre-build file — never nuke uncommitted work\n      safe({ type: 'step', kind: 'note', text: 'commit floor RED — reverted · card held in Doing' })\n      return false\n    }\n    if (!touchedCode) { safe({ type: 'step', kind: 'note', text: 'no code change — card stays in Doing' }); return false }\n    // 2. floor green → commit. --no-verify: the floor just ran. If the commit FAILS there is nothing to\n    //    promote, so hold the card in Doing (the work stays on disk for a retry — we never revert good work).\n    let committed = false\n    try { execFileSync('git', ['add', 'index.html'], { cwd: dir }); execFileSync('git', ['commit', '-q', '--no-verify', '-m', `enso: ${card.text.slice(0, 60)}`], { cwd: dir }); committed = true; safe({ type: 'step', kind: 'tool', text: 'commit floor green · committed' }) }\n    catch { safe({ type: 'step', kind: 'note', text: 'commit FAILED — card held in Doing (work kept; not promoted)' }) }\n    if (!committed) return true   // no commit → nothing to release → stay in Doing; reload shows the live work\n    // 3. THE RELEASE GATE — smoke then receipt (audit). Blocks PROMOTION to Done, never the commit.\n    let released = true\n    try { execFileSync('node', ['qa.mjs', String(card.id)], { cwd: dir }); safe({ type: 'step', kind: 'tool', text: 'smoke ok' }) }\n    catch { released = false; safe({ type: 'step', kind: 'note', text: 'smoke failed — held for review' }) }\n    try { execFileSync('node', ['review.mjs', String(card.id), card.text], { cwd: dir }); safe({ type: 'step', kind: 'tool', text: 'receipt written' }) }\n    catch { released = false; safe({ type: 'step', kind: 'note', text: 'reviewer requested changes — held for review' }) }\n    // 4. promote to Done THROUGH THE BOARD TOOL (move_card) — only if the release gate passed\n    if (released) {\n      try { call('move_card', { id: card.id, status: 'done' }); safe({ type: 'step', kind: 'tool', text: 'board.move_card → done' }) } catch {}\n      safe({ type: 'step', kind: 'note', text: 'built · reloading the board…' })\n    } else {\n      safe({ type: 'step', kind: 'note', text: 'committed · card held in Doing for review' })\n    }\n    return true   // reload either way — the committed code is live; promotion depends on the release gate\n  })\n}\n\ncreateServer(async (req, res) => {\n  const url = new URL(req.url, `http://x`)\n  if (req.method === 'GET' && url.pathname === '/') return send(res, 200, 'text/html', readFileSync(new URL('./index.html', import.meta.url)))\n  if (req.method === 'GET' && url.pathname === '/board') {\n    const b = existsSync(BOARD) ? await readFile(BOARD, 'utf8') : '{\"cards\":[]}'\n    return send(res, 200, 'application/json', b)\n  }\n  if (req.method === 'POST' && url.pathname === '/board') { await writeFile(BOARD, await body(req)); return send(res, 200, 'application/json', '{\"ok\":true}') }\n  if (req.method === 'POST' && url.pathname === '/build') { const { id, text } = JSON.parse(await body(req) || '{}'); return build({ id, text }, res) }\n  if (req.method === 'GET' && url.pathname === '/report') {\n    const b = existsSync(BOARD) ? await readFile(BOARD, 'utf8') : '{\"cards\":[]}'\n    return send(res, 200, 'text/html', report(JSON.parse(b).cards || []))\n  }\n  send(res, 404, 'text/plain', 'not found')\n}).listen(PORT, () => console.log(`enso — http://localhost:${PORT}`))\n"},{"path":"board-mcp.mjs","label":"the board's MCP tools + JSON-RPC transport","lang":"js","code":"#!/usr/bin/env node\n// board MCP — the agent's hands on the board (the \"db\" = board.json).\n// A minimal Model Context Protocol server over stdio (newline-delimited JSON-RPC 2.0),\n// no dependencies, so it's checked in and clone-runs. Claude connects via .mcp.json and\n// manages the board ONLY through these tools — never by editing the file directly.\n//\n// The TOOL LOGIC (`call`) is exported so `node --test` can exercise it without a process;\n// the stdio TRANSPORT only runs when this file is executed directly (see the guard at the\n// bottom). The board path is overridable via ENSO_BOARD so tests use a temp file.\nimport { readFileSync, writeFileSync } from 'node:fs'\nimport { createInterface } from 'node:readline'\nimport { pathToFileURL } from 'node:url'\n\nconst BOARD = new URL(process.env.ENSO_BOARD || './board.json', import.meta.url)\nconst read = () => { try { return JSON.parse(readFileSync(BOARD, 'utf8')).cards || [] } catch { return [] } }\nconst write = (cards) => writeFileSync(BOARD, JSON.stringify({ cards }, null, 2))\nconst ok = (text) => ({ content: [{ type: 'text', text }] })\n\nexport const TOOLS = [\n  { name: 'list_cards', description: 'List every card on the board.', inputSchema: { type: 'object', properties: {} } },\n  { name: 'add_card', description: 'Add a card.', inputSchema: { type: 'object', properties: { text: { type: 'string' }, status: { type: 'string', enum: ['todo', 'doing', 'done'] }, label: { type: 'string' } }, required: ['text'] } },\n  { name: 'move_card', description: 'Move a card to a column (set its status).', inputSchema: { type: 'object', properties: { id: {}, status: { type: 'string', enum: ['todo', 'doing', 'done'] } }, required: ['id', 'status'] } },\n  { name: 'seed', description: 'Reset the board to a small sample set.', inputSchema: { type: 'object', properties: {} } },\n  { name: 'clean', description: 'Remove every card (empty board).', inputSchema: { type: 'object', properties: {} } },\n]\n\nexport function call(name, args = {}) {\n  const cards = read()\n  if (name === 'list_cards') return ok(JSON.stringify(cards))\n  if (name === 'add_card') { const id = cards.reduce((m, c) => Math.max(m, Number(c.id) || 0), 0) + 1; cards.push({ id, text: args.text, status: args.status || 'todo', ...(args.label ? { label: args.label } : {}) }); write(cards); return ok(`added \"${args.text}\" (#${id})`) }\n  if (name === 'move_card') { const c = cards.find((c) => String(c.id) === String(args.id)); if (!c) return ok(`no card ${args.id}`); c.status = args.status; write(cards); return ok(`moved #${args.id} → ${args.status}`) }\n  if (name === 'seed') { write([{ id: 1, text: 'Draft the spec', status: 'todo' }, { id: 2, text: 'Wire the gate', status: 'doing' }, { id: 3, text: 'Ship it', status: 'todo' }]); return ok('seeded') }\n  if (name === 'clean') { write([]); return ok('cleaned') }\n  return ok(`unknown tool ${name}`)\n}\n\n// ── stdio transport — only when run directly (`node board-mcp.mjs`), not when imported ──\nfunction serve() {\n  const send = (msg) => process.stdout.write(JSON.stringify(msg) + '\\n')\n  createInterface({ input: process.stdin }).on('line', (line) => {\n    let req; try { req = JSON.parse(line) } catch { return }\n    const { id, method, params } = req\n    if (method === 'initialize') return send({ jsonrpc: '2.0', id, result: { protocolVersion: '2024-11-05', capabilities: { tools: {} }, serverInfo: { name: 'board', version: '0.1.0' } } })\n    if (method === 'tools/list') return send({ jsonrpc: '2.0', id, result: { tools: TOOLS } })\n    if (method === 'tools/call') return send({ jsonrpc: '2.0', id, result: call(params?.name, params?.arguments) })\n    if (id !== undefined) send({ jsonrpc: '2.0', id, result: {} })   // ack anything else that expects a reply\n  })\n}\n\nif (import.meta.url === pathToFileURL(process.argv[1] || '').href) serve()\n"},{"path":".mcp.json","label":"how claude -p discovers the board's tools","lang":"json","code":"{ \"mcpServers\": { \"board\": { \"command\": \"node\", \"args\": [\"board-mcp.mjs\"] } } }\n"},{"path":"gate.mjs","label":"the deterministic commit floor","lang":"js","code":"#!/usr/bin/env node\n// Ensō gate — the deterministic leash. Runs before every commit; blocks slop.\n// Checks index.html against the enso-design skill's hard rules + basic sanity.\nimport { readFileSync } from 'node:fs'\n\nconst html = readFileSync('index.html', 'utf8')\nconst fails = []\n\n// 1. JS must PARSE — syntax only. This does NOT prove it runs or is correct (that's the\n//    judge's + the browser's job). A cheap floor, honestly named: catches typos, not logic.\nconst js = (html.match(/\u003cscript>([\\s\\S]*?)\u003c\\/script>/) || [,''])[1]\ntry { new Function(js) } catch (e) { fails.push(`JS syntax error: ${e.message}`) }\n\n// 2. No emoji as icons (enso-design: forbidden). Real emoji blocks only — NOT arrows/math\n//    symbols (those aren't emoji; flagging them was a false-positive the review caught).\nif (/[\\u{1F000}-\\u{1FAFF}\\u{2600}-\\u{26FF}\\u{2700}-\\u{27BF}]/u.test(html)) fails.push('emoji found (use drawn marks)')\n\n// 3. No pure white / pure black as a VISIBLE colour (enso-design: warm near-white/near-black only).\n//    The calligraphic ensō's mask reveal needs #fff — an SVG mask-luminance channel, NOT a design\n//    colour — so strip the mask blocks + the mask centreline (.arc) before checking the palette.\nconst visible = html.replace(/\u003cmask[\\s\\S]*?\u003c\\/mask>/gi, '').replace(/\\.enso\\s+\\.arc\\s*\\{[^}]*\\}/g, '')\nif (/#fff(\\b|f{3}\\b)|#ffffff|#000(\\b|000\\b)|#000000/i.test(visible)) fails.push('pure #fff/#000 found (use --bg/--fg tokens)')\n\n// 4. No raw multiplication-sign delete glyph\nif (/>\\s*×\\s*\u003c/.test(html)) fails.push('raw × glyph found (use a drawn remove affordance)')\n\n// 5. The one accent token must be defined (design system present)\nif (!/--accent:\\s*#e8553e/i.test(html)) fails.push('zen accent token missing (design skill not applied)')\n\n// 6. Faithful to the kanban contract: assert the COLUMNS array really declares the three\n//    columns — NOT a substring scan (those words live in CSS/comments regardless). Composition\n//    (\"does it look like a kanban\") is the judge's job, not a deterministic gate's. Honest scope.\nconst cols = (html.match(/COLUMNS\\s*=\\s*\\[([\\s\\S]*?)\\]/) || [, ''])[1]\nfor (const c of ['todo', 'doing', 'done']) if (!cols.includes(`\"${c}\"`) && !cols.includes(`'${c}'`)) fails.push(`column \"${c}\" not declared in COLUMNS`)\n\n// 7. The cycle report is a rendered surface too — gate it for the same visual slop (it used to escape).\ntry {\n  const rpt = readFileSync('report.mjs', 'utf8')\n  if (/[\\u{1F000}-\\u{1FAFF}\\u{2600}-\\u{26FF}\\u{2700}-\\u{27BF}]/u.test(rpt)) fails.push('emoji in report.mjs (the report is a surface too)')\n  if (/#fff(\\b|f{3}\\b)|#ffffff|#000(\\b|000\\b)|#000000/i.test(rpt)) fails.push('pure #fff/#000 in report.mjs')\n} catch {}\n\nif (fails.length) {\n  console.error('\\n  ✗ GATE BLOCKED — ' + fails.length + ' violation(s):')\n  for (const f of fails) console.error('    • ' + f)\n  console.error('  the leash held. fix, then commit.\\n')\n  process.exit(1)\n}\nconsole.log('  ✓ gate passed — calm, clean, faithful.')\n"},{"path":"test/board.test.mjs","label":"behavior tests — the board + MCP","lang":"js","code":"// Behavior floor for the board tools (the MCP logic). Proves spec scenarios S1, S5, and persistence.\n// We point the board at a temp file via ENSO_BOARD, then import the tool logic directly — no process.\nimport { test, before, after } from 'node:test'\nimport assert from 'node:assert/strict'\nimport { mkdtempSync, rmSync, existsSync, readFileSync } from 'node:fs'\nimport { tmpdir } from 'node:os'\nimport { join } from 'node:path'\n\nlet dir, board, call\nbefore(async () => {\n  dir = mkdtempSync(join(tmpdir(), 'enso-board-'))\n  board = join(dir, 'board.json')\n  process.env.ENSO_BOARD = board          // must be set BEFORE importing the module\n  ;({ call } = await import('../board-mcp.mjs'))\n})\nafter(() => rmSync(dir, { recursive: true, force: true }))\n\nconst text = (r) => r.content[0].text\n\ntest('S1 · add_card creates a card and persists it', () => {\n  call('clean')\n  call('add_card', { text: 'add dark mode' })\n  const cards = JSON.parse(text(call('list_cards')))\n  assert.equal(cards.length, 1)\n  assert.equal(cards[0].text, 'add dark mode')\n  assert.equal(cards[0].status, 'todo')                       // defaults to todo\n  assert.ok(existsSync(board))                                // persisted to disk\n  assert.equal(JSON.parse(readFileSync(board, 'utf8')).cards[0].text, 'add dark mode')\n})\n\ntest('add_card assigns monotonic ids (max + 1)', () => {\n  call('clean')\n  call('add_card', { text: 'one' })\n  call('add_card', { text: 'two' })\n  const cards = JSON.parse(text(call('list_cards')))\n  assert.deepEqual(cards.map((c) => c.id), [1, 2])\n})\n\ntest('S5 · move_card changes status through the tool, not a raw write', () => {\n  call('clean')\n  call('add_card', { text: 'ship it' })\n  const r = call('move_card', { id: 1, status: 'doing' })\n  assert.match(text(r), /moved #1 → doing/)\n  assert.equal(JSON.parse(text(call('list_cards')))[0].status, 'doing')\n})\n\ntest('move_card on a missing id is a no-op message, not a crash', () => {\n  call('clean')\n  assert.match(text(call('move_card', { id: 999, status: 'done' })), /no card 999/)\n})\n\ntest('seed loads sample cards; clean empties the board', () => {\n  call('seed')\n  assert.ok(JSON.parse(text(call('list_cards'))).length > 0)\n  call('clean')\n  assert.equal(JSON.parse(text(call('list_cards'))).length, 0)\n})\n\ntest('persistence · a fresh read sees what a prior write stored', () => {\n  call('clean')\n  call('add_card', { text: 'survives reboot', status: 'done' })\n  // simulate a \"reboot\": the data lives in board.json, independent of any in-memory state\n  const onDisk = JSON.parse(readFileSync(board, 'utf8')).cards\n  assert.equal(onDisk[0].text, 'survives reboot')\n  assert.equal(onDisk[0].status, 'done')\n})\n"},{"path":"test/gate.test.mjs","label":"behavior tests — the gate's rules","lang":"js","code":"// Behavior floor for the gate. Proves spec scenario S3: the deterministic gate BLOCKS slop\n// (emoji, a dropped COLUMNS contract) and PASSES clean, faithful output.\n// We run the real gate.mjs in a temp dir against crafted index.html fixtures.\nimport { test, before, after } from 'node:test'\nimport assert from 'node:assert/strict'\nimport { execFileSync } from 'node:child_process'\nimport { mkdtempSync, rmSync, writeFileSync } from 'node:fs'\nimport { tmpdir } from 'node:os'\nimport { join, dirname } from 'node:path'\nimport { fileURLToPath } from 'node:url'\n\nconst GATE = join(dirname(fileURLToPath(import.meta.url)), '..', 'gate.mjs')\n\nlet dir\nbefore(() => { dir = mkdtempSync(join(tmpdir(), 'enso-gate-')) })\nafter(() => rmSync(dir, { recursive: true, force: true }))\n\n// Run the gate in `dir` against a given index.html body; return its exit code (0 = passed).\nfunction runGate(html) {\n  writeFileSync(join(dir, 'index.html'), html)\n  try { execFileSync('node', [GATE], { cwd: dir, stdio: 'pipe' }); return 0 }\n  catch (e) { return e.status ?? 1 }\n}\n\nconst CLEAN = `\u003c!doctype html>\u003chtml>\u003chead>\u003cstyle>\n  :root { --bg:#fbfbfa; --fg:#1a1a1a; --accent:#e8553e; }\n\u003c/style>\u003c/head>\u003cbody>\u003cscript>\n  const COLUMNS = [\"todo\",\"doing\",\"done\"];\n  console.log(COLUMNS.length);\n\u003c/script>\u003c/body>\u003c/html>`\n\ntest('S3 · a clean, faithful surface PASSES the gate', () => {\n  assert.equal(runGate(CLEAN), 0)\n})\n\ntest('S3 · an emoji is BLOCKED', () => {\n  assert.equal(runGate(CLEAN.replace('\u003cbody>', '\u003cbody>\u003cp>launch 🚀\u003c/p>')), 1)\n})\n\ntest('S3 · a dropped COLUMNS contract is BLOCKED', () => {\n  assert.equal(runGate(CLEAN.replace('\"todo\",\"doing\",\"done\"', '\"todo\",\"doing\"')), 1)\n})\n\ntest('pure #000 (instead of the --fg token) is BLOCKED', () => {\n  assert.equal(runGate(CLEAN.replace('--fg:#1a1a1a', '--fg:#000000')), 1)\n})\n\ntest('a missing --accent token (skill not applied) is BLOCKED', () => {\n  assert.equal(runGate(CLEAN.replace('--accent:#e8553e;', '')), 1)\n})\n\ntest('a JS syntax error is BLOCKED', () => {\n  assert.equal(runGate(CLEAN.replace('COLUMNS.length);', 'COLUMNS.length;')), 1)  // unbalanced paren\n})\n"},{"path":".githooks/pre-commit","label":"the hook that arms the floor on every commit","lang":"sh","code":"#!/bin/sh\n# Ensō — the floor, run before every commit (constitution Art. 7).\n# Layer 1: mechanical facts.  Layer 2: behavior.  Either red blocks the commit.\nnode gate.mjs || exit 1\nnode --test || exit 1\n"},{"path":"qa.mjs","label":"the release gate — headless smoke + screenshot","lang":"js","code":"#!/usr/bin/env node\n// qa.mjs — the smoke. ONE thin headless-browser check that the work actually RENDERS and behaves:\n// page loads, the three columns render, the theme toggle (if present) flips data-theme. It writes a\n// screenshot + a receipt. Smoke is RENDERING proof, not correctness — it audits, it doesn't block the\n// commit. Optional by design: if Playwright isn't installed, it records that and exits 0.\n// Usage: node qa.mjs \u003ccardId> [url]   (url defaults to the local file)\nimport { writeFileSync, mkdirSync } from 'node:fs'\nimport { createHash } from 'node:crypto'\nimport { execFileSync } from 'node:child_process'\n\nconst [, , cardId = '0', url] = process.argv\nconst target = url || new URL('./index.html', import.meta.url).href\nmkdirSync(new URL('./.receipts/', import.meta.url), { recursive: true })\nconst shot = new URL(`./.receipts/${cardId}.png`, import.meta.url)\nconst receiptPath = new URL(`./.receipts/${cardId}.qa.json`, import.meta.url)\n\nlet diffHash = '0'\ntry { diffHash = createHash('sha256').update(execFileSync('git', ['diff', 'HEAD'], { encoding: 'utf8' })).digest('hex').slice(0, 12) } catch {}\n\nfunction write(receipt) { writeFileSync(receiptPath, JSON.stringify({ card: cardId, diffHash, at: new Date().toISOString(), ...receipt }, null, 2)) }\n\nlet chromium\ntry { ({ chromium } = await import('playwright')) }\ncatch {\n  write({ checks: [], smokePassed: null, note: 'playwright not installed — smoke skipped (it is optional)' })\n  console.log('  smoke skipped — playwright not installed (optional layer)')\n  process.exit(0)\n}\n\nconst browser = await chromium.launch()\nconst page = await browser.newPage()\nconst checks = []\ntry {\n  await page.goto(target, { waitUntil: 'load' })\n  const columns = await page.locator('.col, [data-status]').count()\n  checks.push({ name: 'columns render', ok: columns > 0 })\n\n  const toggle = page.locator('.theme, [data-theme-toggle], #theme')\n  if (await toggle.count()) {\n    const before = await page.evaluate(() => document.documentElement.getAttribute('data-theme'))\n    await toggle.first().click()\n    const after = await page.evaluate(() => document.documentElement.getAttribute('data-theme'))\n    checks.push({ name: 'theme toggle flips data-theme', ok: before !== after })\n  }\n  await page.screenshot({ path: fileURLToPath(shot) })\n  const smokePassed = checks.every((c) => c.ok)\n  write({ checks, shot: `.receipts/${cardId}.png`, smokePassed })\n  console.log(`  smoke ${smokePassed ? 'passed' : 'FAILED'} → .receipts/${cardId}.qa.json`)\n  await browser.close()\n  process.exit(smokePassed ? 0 : 1)\n} catch (e) {\n  await browser.close()\n  write({ checks, smokePassed: false, note: 'smoke error: ' + e.message })\n  process.exit(1)\n}\nfunction fileURLToPath(u) { return decodeURIComponent(u.pathname) }\n"},{"path":"review.mjs","label":"the release gate — a diff-bound receipt","lang":"js","code":"#!/usr/bin/env node\n// review.mjs — the reviewer. A SEPARATE agent (generator ≠ evaluator) audits a build's diff against\n// spec.md + constitution.md and the smoke result, then leaves a RECEIPT bound to the exact diff.\n// This is the release gate's judgment layer — a SIGNAL, not the floor. It blocks PROMOTION to Done,\n// never the commit. Usage: node review.mjs \u003ccardId> \"\u003ctask text>\"\nimport { execFileSync, spawnSync } from 'node:child_process'\nimport { readFileSync, writeFileSync, mkdirSync, existsSync } from 'node:fs'\nimport { createHash } from 'node:crypto'\n\nconst [, , cardId = '0', task = ''] = process.argv\nconst dir = new URL('.', import.meta.url)\nconst receiptPath = new URL(`./.receipts/${cardId}.review.json`, import.meta.url)\nmkdirSync(new URL('./.receipts/', import.meta.url), { recursive: true })\n\n// The diff this receipt is bound to — a later change makes the receipt STALE (and so it stops counting).\nconst diff = (() => { try { return execFileSync('git', ['diff', 'HEAD~1', 'HEAD', '--', 'index.html'], { cwd: dir, encoding: 'utf8' }) } catch { try { return execFileSync('git', ['diff', 'HEAD'], { cwd: dir, encoding: 'utf8' }) } catch { return '' } } })()\nconst diffHash = createHash('sha256').update(diff).digest('hex').slice(0, 12)\n\n// Did the smoke pass? Read its receipt if present (smoke runs BEFORE review — the reviewer audits the bundle).\nlet smokePassed = null\ntry { smokePassed = JSON.parse(readFileSync(new URL(`./.receipts/${cardId}.qa.json`, import.meta.url), 'utf8')).smokePassed } catch {}\n\nconst spec = safeRead('spec.md')\nconst constitution = safeRead('constitution.md')\nfunction safeRead(f) { try { return readFileSync(new URL('./' + f, import.meta.url), 'utf8') } catch { return '' } }\n\nconst prompt = `You are an independent reviewer (a DIFFERENT lineage from the implementer). Audit this build.\nTASK: ${task}\nSPEC:\\n${spec}\\nCONSTITUTION:\\n${constitution}\\nSMOKE PASSED: ${smokePassed}\nDIFF (index.html):\\n${diff}\\n\nReply with ONLY a JSON object: {\"specSatisfied\":bool,\"constitutionPreserved\":bool,\"concerns\":[string],\"verdict\":\"pass\"|\"changes\"}`\n\n// Default = reviewer NOT AVAILABLE (no claude CLI): a clean 'skipped'. The deterministic floor already\n// proved the code; the review is the ADVISORY layer, so an absent reviewer promotes with this logged note.\nlet body = { specSatisfied: null, constitutionPreserved: null, concerns: ['reviewer not run (no claude CLI)'], verdict: 'skipped' }\nconst cl = spawnSync('claude', ['-p', prompt, '--output-format', 'text'], { cwd: dir, encoding: 'utf8', timeout: 180_000 })\nif (cl.status === 0 && cl.stdout) {\n  // The reviewer RAN — its judgment is now binding. Garbled output is a FAILURE, not a free pass.\n  const m = cl.stdout.match(/\\{[\\s\\S]*\\}/)\n  if (m) { try { body = JSON.parse(m[0]) } catch { body = { ...body, verdict: 'error', concerns: ['reviewer output unparseable'] } } }\n  else { body = { ...body, verdict: 'error', concerns: ['reviewer returned no JSON'] } }\n}\n\nconst receipt = { card: cardId, task, diffHash, testsPassed: true, smokePassed, ...body, at: new Date().toISOString() }\nwriteFileSync(receiptPath, JSON.stringify(receipt, null, 2))\nconsole.log(`  receipt → .receipts/${cardId}.review.json  (verdict: ${receipt.verdict}, diff ${diffHash})`)\n// Hold the card on an OBJECTION ('changes') or a reviewer FAILURE ('error'). 'pass' and an absent-reviewer\n// 'skipped' both promote — the floor is the hard gate; this audit is advisory. (Promotion ≠ un-commit.)\nprocess.exit(receipt.verdict === 'changes' || receipt.verdict === 'error' ? 1 : 0)\n"},{"path":"report.mjs","label":"the cycle report — a closing ensō","lang":"js","code":"// The cycle report — a self-contained zen page summarizing THIS cycle from the board.\n// Lives in its own file (not inside server.mjs) and is checked by the gate, so it can't drift.\n// One closing ensō (arc = % done), the count, the quiet list of what shipped, one weighted line.\nconst esc = (s) => String(s).replace(/[&\u003c>\"]/g, (c) => ({ '&': '&amp;', '\u003c': '&lt;', '>': '&gt;', '\"': '&quot;' }[c]))\n\nexport function report(cards) {\n  const done = cards.filter((c) => c.status === 'done')\n  const total = cards.length\n  const frac = total ? done.length / total : 0\n  const C = 2 * Math.PI * 15, GAP = C * 0.16            // same ensō geometry as the board\n  const arc = `${frac * (C - GAP)} ${C}`, track = `${C - GAP} ${C}`\n  const line = total === 0 ? 'Nothing was set down this cycle. The page is still blank.'\n    : frac === 1 ? 'The circle closes. Every card came to rest.'\n    : frac === 0 ? 'The circle is open. All of it still waits.'\n    : `${done.length} of ${total} came to rest. The arc is still inking.`\n  const shipped = done.length\n    ? `\u003cul class=\"shipped\">${done.map((c) => `\u003cli>${esc(c.text)}\u003c/li>`).join('')}\u003c/ul>`\n    : `\u003cp class=\"empty\">Nothing has settled this cycle.\u003c/p>`\n  return `\u003c!DOCTYPE html>\n\u003chtml lang=\"en\">\n\u003chead>\n\u003cmeta charset=\"utf-8\">\n\u003cmeta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n\u003ctitle>The cycle\u003c/title>\n\u003clink rel=\"icon\" href=\"data:,\">\n\u003cstyle>\n  :root { --bg:#fbfbfa; --fg:#1a1a1a; --muted:#9b9b97; --line:#ececea; --accent:#e8553e; }\n  * { box-sizing:border-box; margin:0; padding:0; }\n  body {\n    background:var(--bg); color:var(--fg);\n    font:16px/1.5 -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif;\n    -webkit-font-smoothing:antialiased;\n    display:flex; justify-content:center; paddi
