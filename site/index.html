ng:14vh 24px;\n  }\n  main { width:100%; max-width:560px; text-align:center; }\n  .enso { width:120px; height:120px; margin:0 auto 40px; display:block; }\n  .enso circle { fill:none; stroke-width:2; stroke-linecap:round; }\n  .enso .track { stroke:var(--line); }\n  .enso .arc { stroke:var(--accent); }\n  .count { font-size:13px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); }\n  .count b { color:var(--fg); font-weight:600; }\n  .label { font-size:13px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin:56px 0 20px; }\n  .shipped { list-style:none; }\n  .shipped li { color:var(--muted); text-decoration:line-through; padding:10px 0; border-bottom:1px solid var(--line); }\n  .shipped li:last-child { border-bottom:none; }\n  .empty { color:var(--muted); opacity:.65; font-size:14px; }\n  .line { color:var(--fg); margin-top:56px; line-height:1.7; }\n  .back { display:inline-block; margin-top:40px; font-size:13px; color:var(--muted); text-decoration:none; transition:color .15s ease-out; }\n  .back:hover { color:var(--accent); }\n\u003c/style>\n\u003c/head>\n\u003cbody>\n  \u003cmain>\n    \u003csvg class=\"enso\" viewBox=\"0 0 36 36\" role=\"img\" aria-label=\"${done.length} of ${total} done\">\n      \u003ccircle class=\"track\" cx=\"18\" cy=\"18\" r=\"15\" transform=\"rotate(-45 18 18)\" style=\"stroke-dasharray:${track}\"/>\n      \u003ccircle class=\"arc\"   cx=\"18\" cy=\"18\" r=\"15\" transform=\"rotate(-45 18 18)\" style=\"stroke-dasharray:${arc}\"/>\n    \u003c/svg>\n    \u003cp class=\"count\">\u003cb>${done.length}\u003c/b> done&nbsp;/&nbsp;${total}\u003c/p>\n    \u003cp class=\"label\">What shipped\u003c/p>\n    ${shipped}\n    \u003cp class=\"line\">${line}\u003c/p>\n    \u003ca class=\"back\" href=\"/\">&larr; back to the board\u003c/a>\n  \u003c/main>\n\u003c/body>\n\u003c/html>`\n}\n"},{"path":"spec.md","label":"the spine — user stories + acceptance scenarios","lang":"md","code":"# Ensō — spec  (intent is the source of truth, not the code)\n\n> Ensō is an **agentic kanban board**: you plan in plain tasks; a leashed agent builds them; a deterministic\n> floor decides whether the work lands. This spec is Spec-Kit-shaped — stories, acceptance, requirements,\n> success criteria, assumptions, non-goals. The acceptance scenarios below *become the tests* in `test/`.\n\n## User stories\n\n- **As the planner (a human)**, I can add a task to the board so the work is captured before anything is built.\n- **As the planner**, I can drag a task into **Doing** to start a build of exactly that task — and nothing\n  builds until I do, so I stay in command.\n- **As the planner**, I can watch the agent's reasoning and tool calls stream live, so latency is legible and I\n  can stop it.\n- **As the planner**, I can trust that work only lands when a deterministic floor (gate + tests) is green, so a\n  confident-but-wrong agent cannot ship slop.\n- **As a reviewer (later, or in CI)**, I can read a diff-bound receipt to see whether a build satisfied the spec\n  and the constitution.\n- **As a learner**, I can `git checkout` any stage and rebuild forward, because each stage is one clean commit.\n\n## Acceptance scenarios  (given / when / then — the testable heart)\n\n1. **Add a task.** *Given* an empty Todo column, *when* I type \"add dark mode\" and press Enter, *then* a card\n   `{text:\"add dark mode\", status:\"todo\"}` appears at the top of Todo and persists across reload.\n2. **Drag starts a build.** *Given* a card in Todo, *when* I drag it to Doing, *then* exactly one build run starts\n   for that card and no other.\n3. **The floor blocks slop.** *Given* a build whose output contains an emoji or drops the `COLUMNS` contract,\n   *when* the gate runs, *then* the commit is **blocked** and the card stays in Doing.\n4. **The floor blocks broken behavior.** *Given* a change that breaks board persistence or an MCP tool, *when*\n   `node --test` runs, *then* it fails and the commit is **blocked**.\n5. **Board mutations go through tools.** *Given* a build that completes, *when* the card is moved to Done, *then*\n   the move happens through `move_card` (the board tool), not a raw `board.json` write.\n6. **Green floor lands the work.** *Given* a build whose diff passes gate + tests, *when* it finishes, *then* it\n   commits, the card moves to Done, and the board reloads showing the new feature.\n7. **Receipts are diff-bound.** *Given* a reviewer receipt for a build, *when* the diff changes after the receipt\n   was written, *then* the receipt is detected as **stale** and does not count.\n\n## Functional requirements\n\n- **Board:** three columns — Todo / Doing / Done in a `COLUMNS` array. Add a card; drag between columns; order and\n  status persist (survive reboot) via `board.json`.\n- **Agentic build:** dragging a card to Doing spawns a bounded `claude -p` child that builds *that one task* by\n  editing `index.html`, streaming reasoning + tool calls over SSE; on a green floor it commits and the card → Done.\n- **Tools (MCP):** `list_cards / add_card / move_card / seed / clean` over stdio JSON-RPC; `board.json` is a JSON\n  stand-in for a DB. All board mutations go through these tools.\n- **Floor:** `node gate.mjs` (mechanical facts) + `node --test` (behavior), wired to `.githooks/pre-commit`.\n- **Audit:** a reviewer receipt (`.receipts/\u003ccard>.review.json`) bound to the diff; an optional thin browser smoke.\n- **Self-managing:** the board can hold its own dev tasks (from `tasks.md`) and work them.\n- **Report:** a closing cycle report (an open ensō + what shipped).\n\n## Success criteria\n\n- A cold `git clone` + `course/build-history.sh` reproduces all ten stages; each runs as documented.\n- `node gate.mjs && node --test` is green at every gated stage; breaking a rule blocks a commit.\n- The theme-picker (`9-reference`) builds through the full loop and its smoke passes.\n- A skeptical engineer cannot catch a false claim on stage (verified by an independent reviewer).\n\n## Assumptions\n\n- Node 18+ and a logged-in `claude` CLI are available. (Playwright + a browser only for the optional smoke.)\n- The demo runs in a throwaway repo with **no secrets**; git is the undo.\n- One build at a time; the human chooses what to build by dragging.\n\n## Non-goals\n\n- Not a production task tracker (no auth, multi-user, real DB, deploy).\n- No domain modeling beyond `{ id, text, status }` — no DDD, no entities/aggregates.\n- No multi-agent swarm — one implementer, one reviewer, one smoke. (Lanes generalize; we teach the pattern.)\n- Not proof of *correctness* from the LLM layers — receipts are audit, smoke is rendering. The floor is the proof.\n\n---\n\n*This spec is what the gate and tests enforce, and what every task in `tasks.md` points back to.*\n"},{"path":"constitution.md","label":"the spine — the rules the reviewer audits","lang":"md","code":"# Ensō — constitution\n\n> The **constitution** is the engineering rules every build inherits — the non-negotiables an agent must\n> respect. The Skill (`.claude/skills/enso-design`) governs *taste* (how it looks); this governs *behavior*\n> (how it's built). Taste and rules are different files because they change for different reasons.\n>\n> Cards are built against this document. The reviewer audits adherence to it. Violating an article is grounds\n> to block or send a card back.\n\n## Articles\n\n1. **Spec before implementation.** No feature is built before it exists in `spec.md`. Intent is the source of\n   truth; the code is downstream of it.\n\n2. **Tests before autonomy.** An agent is only allowed to act autonomously on a surface that has a deterministic\n   floor — `node gate.mjs` (mechanical facts) and `node --test` (behavior). No floor, no autonomy.\n\n3. **The floor decides; everything else advises.** The gate and tests are the only things that may *block a\n   commit*. A reviewer sub-agent is a **signal**. A browser check is **smoke**. Neither is correctness, and\n   neither overrides a red floor or rescues one.\n\n4. **No hidden agent side effects.** An agent changes only what the task names. Board state changes go through\n   the board's tools (MCP), never a raw file write. The diff after a build must be explainable line by line.\n\n5. **Bounded loops.** Every autonomous run is bounded — a timeout and a single task per run. An agent that hasn't\n   finished inside its bound is stopped, not extended. No unbounded \"keep going.\"\n\n6. **Least privilege.** Give the narrowest tools that do the job. `--dangerously-skip-permissions` is acceptable\n   *only* in a throwaway repo with no secrets and git as the undo; never against a real codebase. There, scope\n   `--allowedTools`, sandbox the worktree, and keep prod credentials out of reach.\n\n7. **The gate runs before every commit.** Enforced by `.githooks/pre-commit`. A local hook is the fast floor; the\n   same checks must also run in CI, where they cannot be skipped with `--no-verify`. Local hook = floor; CI = wall.\n\n8. **Generator ≠ evaluator.** The thing that writes the code never decides, alone, whether it is good. The\n   deterministic floor (a different kind of thing entirely) and an independent reviewer (a different lineage) do.\n\n9. **Receipts, not claims.** A judgment only counts if it leaves an artifact bound to the exact diff it judged —\n   inspectable, versioned, stale-detectable. \"It looks fine\" said in chat is not evidence.\n\n10. **Smallest thing that works.** Karpathy-clean: single-concern functions, no dead code, no dependency added\n    without paying rent, no domain modeling a `{ id, text, status }` card doesn't need. Simplicity is a feature\n    of the lesson, not a constraint on it.\n\n## How the loop honors this\n\n```\nhuman authors spec + tasks (Art. 1)         →  agent builds ONE task, bounded, least-privilege (Art. 4,5,6)\n  →  gate.mjs + node --test = the floor (Art. 2,3,7)  →  reviewer receipt audits adherence (Art. 8,9)\n  →  browser smoke proves it renders        →  on a green floor, commit; the card moves via move_card (Art. 4)\n```\n\nIf any article and a convenience disagree, the article wins — then we fix the convenience.\n"},{"path":"plan.md","label":"the spine — the plan","lang":"md","code":"# Ensō — plan  (the technical approach: how we satisfy the spec)\n\n> The bridge from `spec.md` (what) to `tasks.md` (the executable list). Small, dependency-light, single-file UI\n> plus a tiny Node backend. Everything here traces back to a requirement in the spec and a rule in the constitution.\n\n## Architecture (the whole thing is a handful of small files)\n\n| File | Role | Spec requirement it serves |\n|------|------|-----------------------------|\n| `index.html` | the board UI — single file, vanilla JS, the `COLUMNS` contract, quick-add, drag, the SSE feed | Board; agentic build (UI) |\n| `board.json` | the store — a JSON stand-in for a DB | Board persistence |\n| `board-mcp.mjs` | the board's **tools** over stdio JSON-RPC (`list/add/move/seed/clean`) | Tools (MCP); \"mutations go through tools\" |\n| `.mcp.json` | how `claude -p` discovers the board tools | Agentic build |\n| `server.mjs` | serves the board; on drag-to-Doing runs a **bounded** build; forwards SSE; runs the floor; moves the card via `move_card` | Agentic build; floor; Art. 4/5 |\n| `gate.mjs` | the deterministic **mechanical** floor (parse, no emoji, no pure #fff/#000, `--accent`, `COLUMNS`) | Floor (layer 1) |\n| `test/*.mjs` | the **behavior** floor — Node's built-in runner (`node --test`) | Floor (layer 2) |\n| `.githooks/pre-commit` | runs `node gate.mjs && node --test` before every commit | Constitution Art. 7 |\n| `review.mjs` | a **separate** agent that writes a diff-bound receipt | Audit |\n| `qa.mjs` | one thin Playwright **smoke** (loads, renders, toggles, screenshots) | Audit |\n| `report.mjs` | the closing cycle report | Report |\n| `scripts/conduct.mjs` | the take-home conductor (loop runs itself) | Self-managing |\n\n## The build loop (when a card enters Doing)\n\n```\n1. CONTEXT     server builds a small context artifact for the task:\n               real files in play · routes · the floor commands · the MCP tools · constraints\n               from constitution.md + the skill.  (Prevents context blindness — Spec-Kit \"Agents\" lesson.)\n2. IMPLEMENT   spawn a BOUNDED `claude -p --output-format stream-json --verbose --mcp-config .mcp.json`\n               with the task + the context; it edits index.html; stream reasoning + tool calls over SSE.\n3. FLOOR       on close: `node gate.mjs` then `node --test`. Red → restore the pre-build snapshot, card\n               stays in Doing, reasons streamed. (The floor is the only thing that blocks.)\n4. COMMIT      green floor → commit index.html (`--no-verify`: the floor just ran). Commit fails → hold in Doing.\n5. RELEASE     the audit, on the committed diff: `qa.mjs` (smoke) then `review.mjs` (reviewer receipt, diff-bound).\n6. PROMOTE     released → move the card to Done **through `move_card`**; the board reloads. (Promotion ≠ commit.)\n```\n\nBound = a timeout (Art. 5) and exactly one task per run. Least-privilege tools (Art. 6). No board write except\nthrough the tools (Art. 4).\n\n## The gate stack (cheapest first; only 1–2 block)\n\n1. `node gate.mjs` — instant mechanical facts. **Blocks.**\n2. `node --test` — behavior (gate rules, MCP tools, persistence). **Blocks.**\n3. browser smoke (`qa.mjs`) — rendering. *Audit/optional.*\n4. reviewer receipt (`review.mjs`) — judgment, diff-bound. *Audit/optional.*\n\n## Constraints\n\n- No dependencies in the core artifact (the smoke's Playwright is dev-only, isolated).\n- Single-file UI; a Node backend with no framework.\n- Additive changes; `board.json` is the system of record; confirm-before-write for any mutation.\n- Every stage is one clean commit so the git log reads like the tutorial.\n\n## Risks & mitigations\n\n- **Live build stalls on stage** → every stage is a pre-baked git tag; `9-reference` is the guaranteed fallback;\n  pre-recorded clips on a hotkey.\n- **Agent forgets to move the card** → the server reconciles by calling `move_card` itself (same tool path), so\n  the claim stays true and the result is reliable.\n- **Playwright/browser unavailable** → smoke is optional and isolated; the floor (gate + tests) never depends on it.\n"},{"path":"tasks.md","label":"the spine — where the board's cards come from","lang":"md","code":"# Ensō — tasks  (the executable list; the board's cards derive from here)\n\n> Each task is small, ordered, and **acceptance-checkable** — it names the spec scenario it satisfies and how\n> you'd know it's done. The board's Todo column is this file made physical: *you* author this list, then enqueue\n> a task (`add_card`, or `conduct.mjs --add \"…\"`) and drag it to Doing to build it. (\"Planner = the human\" is\n> honest because you wrote it.) `seed` drops a few sample cards if you just want something to drag.\n>\n> Format: `[ ]` todo · `[~]` doing · `[x]` done · each line: **task** — *satisfies* S# — **done when** …\n\n## Build tasks (how Ensō builds itself, in order)\n\n- [x] **Baseline todo** — *satisfies* (pre-spec) — done when `index.html` opens and adds/removes a todo. `1-vibe`\n- [x] **Apply the Skill** — *satisfies* aesthetic req — done when the surface matches `.claude/skills/enso-design`. `2-skill`\n- [x] **Kanban surface** — *satisfies* S1 — done when three columns in a `COLUMNS` array, drag persists. `3-kanban`\n- [x] **The implementer (agentic build)** — *satisfies* S2,S5,S6 — done when dragging to Doing builds one card, streams it, and the card reaches Done through `move_card` (never a raw write). `4-agentic`\n- [x] **The gate** — *satisfies* S3 — done when `node gate.mjs` blocks slop and the pre-commit hook runs it. `5-gate`\n- [x] **The tests** — *satisfies* S4 — done when `node --test` proves behavior and is part of the floor. `6-tests`\n- [x] **Spec + constitution** — *satisfies* Art.1 — done when `spec.md` + `constitution.md` exist and the floor enforces them. `7-spec`\n- [x] **Release gate (reviewer receipt)** — *satisfies* S7 — done when a build writes a diff-bound `.receipts/\u003ccard>.review.json` that gates promotion. `8-release-gate`\n- [x] **Reference feature + smoke** — *satisfies* S6 + success criteria — done when the theme-picker ships through the loop and `qa.mjs` passes. `9-reference`\n- [x] **The conductor (take-home)** — *satisfies* the loop — done when `conduct.mjs` runs board → floor → commit → `move_card`, no hand on the keyboard. `explore-conductor`\n\n## Open tasks (what a learner / the conductor builds next — the live demo picks one of these)\n\n- [ ] **Add a theme picker** — *satisfies* S6 — done when a light/dark toggle flips `data-theme`, persists, stays zen-faithful, and the floor + smoke pass. *(the `9-reference` demo task)*\n- [ ] **Add a \"clear Done\" affordance** — *satisfies* board req — done when finished cards can be cleared via a restrained drawn mark (no raw glyph), persisted, floor green.\n- [ ] **Show card age** — *satisfies* board req — done when each card shows a quiet relative age in `--muted`, no layout shift, floor green.\n- [ ] **Cache the ensō dasharray** — *satisfies* Art.10 — done when the ensō geometry is computed once (no per-render recompute), behavior unchanged, tests green.\n\n## How a task becomes a card\n\n`board-mcp.mjs` exposes `add_card` (enqueue a task above), `seed` (a few sample cards), and `move_card`. The board reads\n`board.json`. Drag a card to Doing → the implementer builds exactly that task, against `spec.md` + `constitution.md`.\nA task is only \"done\" when its **done-when** check passes *and* the floor is green — not when the agent says so.\n"},{"path":".claude/skills/enso-design/SKILL.md","label":"the taste — the Skill the agent inherits","lang":"md","code":"---\nname: enso-design\ndescription: The Ensō visual language. Apply to any surface so it stays calm, minimal, and coherent — Karpathy-clean code, Steve-Jobs-calm design. Use before building or restyling any UI in this project.\n---\n\n# Zen design — the Ensō visual language\n\nSmall yet elegant. Subtraction, not features. Every mark earns its place.\n\n## Tokens (the only palette — no bespoke hex on surfaces)\n```\n--bg:     #fbfbfa   /* near-white paper, never pure #fff */\n--fg:     #1a1a1a   /* warm near-black ink */\n--muted:  #9b9b97   /* secondary text, resting affordances */\n--line:   #ececea   /* hairline separators */\n--accent: #e8553e   /* ONE accent (warm vermilion). Used to MEAN, never to decorate */\n```\nOne accent per viewport. No second accent, no gradients, no shadows-as-decoration.\n**Use the tokens, not raw hex.** Reach for `var(--bg/--fg/--muted/--line/--accent)`. For a translucent tint, use `rgba()` of the token's channels (e.g. `rgba(232,85,62,0.08)` for accent), **never** `#fff`/`#000` or `rgba(255,255,255,…)`/`rgba(0,0,0,…)`. The shadow of \"white\" is still warm paper, not pure white.\n\n## Gate contract — checked deterministically; a violation BLOCKS the commit (`node gate.mjs`)\nBuild to pass it the first time. On `index.html` (and `report.mjs`) the gate rejects:\n1. **Emoji** anywhere — use drawn marks (thin SVG strokes), never glyph icons.\n2. **Pure `#fff` / `#ffffff` / `#000` / `#000000`** (any case) — use `--bg`/`--fg`; for translucency use `rgba()` of a token's channels, never of 255/255/255 or 0/0/0.\n3. A missing **`--accent`** token (it must be defined).\n4. Columns not in a **`COLUMNS`** array declaring `todo`, `doing`, `done`.\n5. An inline `\u003cscript>` that doesn't **parse**.\n6. A raw `×` delete glyph (`>×\u003c`) — use a restrained drawn remove affordance instead.\n7. The same emoji + pure-color checks also run on `report.mjs` (it's a rendered surface too) — **seven checks in all**.\nIf you need a near-white/near-black, the tokens already are exactly that — don't reach past them.\n\n## Type\nSystem stack (`-apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif`), 16px/1.5, antialiased.\nSection labels: 13px, 600, uppercase, letter-spacing .12em, in `--muted`. Body in `--fg`.\n\n## Layout\nCentered single column, generous air (≥14vh top padding). Hairline (`--line`) separators, never boxes/cards with borders+shadows. Let whitespace do the dividing.\n\n## Motion (calm-flat)\nHover = subtle tint or affordance reveal. Focus = accent, not a heavy ring. **No shadow/elevation change on state.** Transitions ≤200ms ease-out. **No springs, no bounce.** Entrance/exit of list items gets a quiet fade/height transition so the surface feels like a calm object, not a spreadsheet.\n\n## Affordances\nChecks = thin circle → fills with `--accent` + check when done. Destructive/remove = a restrained drawn mark that fades in on hover (never a loud raw glyph). Done text → `--muted` + strikethrough.\n\n## Progress = the ensō (signature)\nAny progress/loading/completeness uses an **ensō** (an open ink ring whose arc = % done, opening at top-right) — never a spinner, bar, or percent-only. The gap it hasn't closed is the point.\n\n**The ensō must be calligraphic, not geometric.** It is a single brush stroke, not a perfect progress ring: uneven stroke width (thicker at the start of the sweep, tapering to a dry, thinning end), a slightly irregular path (a hand, not a compass), and a visible open gap that never closes. Implement with a variable-width path (or a stroke whose `stroke-width` + opacity taper toward the tail) and `stroke-linecap: round`; avoid a uniform `stroke-width` circle. A flat, even ring is a bug, not the ensō.\n\n## Agentic step feed (when an agent works on a surface)\nWhen an agent does work, the user must SEE it think and act — calmly, never a frozen spinner. Stream it live:\n- Forward the agent's **reasoning** (its `thinking` blocks), its **narration** (text), and **every tool call** as they happen (SSE / a stream).\n- Each step **fades IN** (≤280ms ease-out, a few px of translateY), rests at ~0.9 opacity; old steps **fade OUT gracefully** (a `leaving` class transitions opacity→0, removed on `transitionend`) — **never snap-remove**. Keep ~6 visible. When the run settles, the whole feed **fades out**, never blanks abruptly.\n- Distinguish quietly by weight, not color noise: **reasoning** = italic muted; **narration** = muted; **tool calls** = ink. The working indicator is the **ensō**, never a spinner bar.\n- The point: latency made legible — you watch the agent think and act, and it feels like a calm object, not a loading screen.\n\n## Code (Karpathy-clean — the design extends to the source)\nSingle concern per function, well-named, no dead code, readable top-to-bottom, smallest that works. The code is part of the craft; an elegant surface on ugly code fails the bar.\n\n## Empty states\nPurposeful and quiet — a single calm line, on-brand, never a blank void or a loud illustration.\n\n## Forbidden\nEmoji as icons · pure-white/black · multiple accents · drop-shadow cards · spring animation · raw `×`/clip-art glyphs · clutter, chrome, or anything that doesn't earn its place.\n"},{"path":"scripts/conduct.mjs","label":"the conductor — the loop runs itself","lang":"js","code":"#!/usr/bin/env node\n/**\n * conduct.mjs — Claude conducts the Ensō build, from Ensō's OWN board.\n *\n * The loop turned on itself. No human, no external system: the kanban (board.json) is the\n * source of truth. For the next 'todo' card, the conductor:\n *   1. moves it to 'doing',\n *   2. has CLAUDE build it (claude -p edits index.html, following the enso-design skill),\n *   3. runs the LEASH (gate.mjs) — block ⇒ the card stays 'doing',\n *   4. (optional) grades it with a second model (gemini),\n *   5. records cost, commits index.html, and moves the card to 'done'.\n * You authored the loop in ten moves; here the loop authors the work with no hand on the keyboard.\n *\n *   node scripts/conduct.mjs                      # conduct the next 'todo' card\n *   node scripts/conduct.mjs --card 3        # conduct a specific card id\n *   node scripts/conduct.mjs --add \"text\"    # enqueue a build card, then exit\n *\n * Run from the repo root (board.json, index.html, gate.mjs live there).\n * Self-test (no live CLI): ZENBAN_CONDUCT_SELFTEST=1 makes a tiny safe edit instead of calling Claude\n * — proves the board→gate→commit→done loop end-to-end without a logged-in `claude`.\n */\nimport { execFileSync } from 'node:child_process'\nimport { readFileSync, writeFileSync, existsSync, appendFileSync } from 'node:fs'\nimport { join } from 'node:path'\n\nconst REPO = process.env.ZENBAN_REPO || process.cwd()\nconst BOARD = join(REPO, 'board.json')\nconst INDEX = join(REPO, 'index.html')\nconst arg = (f) => { const i = process.argv.indexOf(f); return i > 0 ? process.argv[i + 1] : null }\nconst sh = (cmd, a, o = {}) => execFileSync(cmd, a, { encoding: 'utf8', maxBuffer: 64 \u003c\u003c 20, cwd: REPO, ...o })\n\nconst readBoard = () => { try { return JSON.parse(readFileSync(BOARD, 'utf8')).cards || [] } catch { return [] } }\n\n// The board changes ONLY through the typed board tools (board-mcp's `call`) — never a raw write — the\n// same invariant the build agent obeys. ENSO_BOARD points the tools at THIS repo's board.json.\nprocess.env.ENSO_BOARD = BOARD\nconst { call } = await import(new URL('../board-mcp.mjs', import.meta.url))\n\n// --add: enqueue a build card THROUGH the tool and stop (handy for staging the demo).\nconst addText = arg('--add')\nif (addText) {\n  call('add_card', { text: addText })\n  console.log(`+ queued \"${addText}\"`); process.exit(0)\n}\n\n// 1. The board = source of truth: pick the stage to conduct.\nconst cards = readBoard()\nconst wantId = arg('--card')\nconst card = wantId\n  ? cards.find((c) => String(c.id) === String(wantId))\n  : cards.filter((c) => c.status === 'todo').sort((a, b) => Number(a.id) - Number(b.id))[0]\nif (!card) { console.error('no ‘todo’ card to conduct. add one:  node scripts/conduct.mjs --add \"your stage\"'); process.exit(1) }\nconsole.log(`▸ conducting \"${card.text}\" (#${card.id})`)\n\n// 2. Move it to 'doing' THROUGH THE TOOL (never a raw write).\ncall('move_card', { id: card.id, status: 'doing' })\n\n// 3. Claude drives the RUNNER (claude -p), editing index.html per the card.\nconst index = existsSync(INDEX) ? readFileSync(INDEX, 'utf8') : ''\nconst t0 = Date.now()\nlet cost = 0, turns = 0\nif (process.env.ZENBAN_CONDUCT_SELFTEST) {\n  // self-test: a tiny, gate-safe edit standing in for Claude's build\n  writeFileSync(INDEX, index.replace('\u003c/body>', `\u003c!-- conducted: ${card.text} -->\\n\u003c/body>`))\n  console.log('  runner: (self-test) tiny safe edit')\n} else {\n  const prompt = `You are advancing ONE stage of Ensō, a single-file zen kanban. Read and FOLLOW .claude/skills/enso-design/SKILL.md exactly.\nSTAGE: ${card.text}\nRules: edit index.html only; single file, no dependencies; Karpathy-clean, smaller-is-better, calm. Keep what works; change only what this stage needs. When done, stop.\nCurrent index.html:\\n\\n${index}`\n  let runner\n  try { runner = JSON.parse(sh('claude', ['-p', prompt, '--output-format', 'json', '--dangerously-skip-permissions'])) }\n  catch (e) { console.error('runner failed: ' + e); process.exit(1) }\n  cost = runner.total_cost_usd ?? 0; turns = runner.num_turns ?? 0\n  console.log(`  runner: $${cost} · ${Math.round((Date.now() - t0) / 1000)}s · ${turns} turns`)\n}\nconst secs = Math.round((Date.now() - t0) / 1000)\n\n// 4. The LEASH — the FULL floor: gate (mechanical) + tests (behavior), per constitution.md.\n//    Either red ⇒ the card stays 'doing'.\nlet gatePass = true\ntry { console.log('  ' + sh('node', ['gate.mjs']).trim()); sh('node', ['--test']) }\ncatch (e) { gatePass = false; console.log((e.stdout || '').trim() + '\\n  ✗ floor blocked — card held at ‘doing’.') }\n\n// 5. (optional) a second model grades it — generator never certifies itself.\nif (gatePass && !process.env.ZENBAN_CONDUCT_SELFTEST) {\n  try {\n    const g = `Independent reviewer, DIFFERENT lineage. Score ONLY these /10 each, HIGH bar (naming any flaw caps below 10): Works, Karpathy-code, Jobs-design, A11y, Faithful-to-enso-design, Small. Output 6 scores + sum/60 + one-line verdict. Terse. index.html:\\n\\n${readFileSync(INDEX, 'utf8')}`\n    console.log('  ── grade ──\\n' + sh('gemini', ['--skip-trust', '-p', g], { env: { ...process.env, GEMINI_CLI_TRUST_WORKSPACE: 'true' } }).trim().split('\\n').map((l) => '  ' + l).join('\\n'))\n  } catch { console.log('  grade skipped (no second model).') }\n}\n\n// 6. Record cost, commit index.html, move the card to 'done' (only if the leash passed).\nappendFileSync(join(REPO, 'metrics.jsonl'),\n  JSON.stringify({ stage: card.text, cost_usd: cost, secs, turns, gatePass, ts: new Date().toISOString().slice(0, 19) }) + '\\n')\nif (gatePass) {\n  sh('git', ['add', 'index.html'])\n  let committed = false\n  try { sh('git', ['commit', '-q', '-m', `conduct: ${card.text}`]); committed = true } catch {}\n  if (committed) {\n    call('move_card', { id: card.id, status: 'done' })   // promote THROUGH the tool, never a raw write\n    console.log(`✓ Claude conducted \"${card.text}\" → done, committed, $${cost} logged.`)\n  } else {\n    console.log(`▸ \"${card.text}\" built + floor-green, but the commit failed — held at ‘doing’.`)\n  }\n} else {\n  writeFileSync(INDEX, index)   // restore the pre-build snapshot — never `git checkout` (see PITFALLS.md)\n  console.log(`▸ \"${card.text}\" held at ‘doing’ — the leash did not pass it. (index.html restored.)`)\n}\n"},{"path":"course/build-history.sh","label":"builds the ten stage tags into ./.built","lang":"sh","code":"#!/usr/bin/env bash\n# Ensō — build the ten-stage course history into a fresh git repo.\n#\n# Each stage is ONE commit + ONE tag, introducing exactly one concept (vibe → earn the discipline).\n# We build into a SEPARATE target dir so the builder never has to hide files from itself — the result\n# is a clean, reproducible tutorial whose `git log` IS the course.\n#\n#   bash course/build-history.sh [TARGET_DIR]      # default: ./.built\n#   cd \u003ctarget> && git log --oneline && git checkout 6-tests\n#\nset -euo pipefail\nROOT=\"$(cd \"$(dirname \"$0\")/..\" && pwd)\"          # the enso/ repo root (this file lives in course/)\nSRC=\"$ROOT/course/stages\"                          # the per-stage index.html checkpoints\nTARGET=\"${1:-$ROOT/.built}\"\n\nrm -rf \"$TARGET\"; mkdir -p \"$TARGET\"; cd \"$TARGET\"\ngit init -q; git config user.email \"course@enso\"; git config user.name \"Ensō course\"\n\n# commit the working tree as one stage. --no-verify: we're laying down the reference, not re-gating it.\nstage () { git add -A; git commit -q --no-verify -m \"$2\"; git tag \"$1\"; printf '  ✓ %-18s %s\\n' \"$1\" \"$2\"; }\ncopy ()  { cp -R \"$ROOT/$1\" \"./$2\" 2>/dev/null || true; }\n\necho \"building the Ensō history → $TARGET\"\n\n# ── ACT I — vibe (it works, because it's a toy) ──────────────────────────────\ncp \"$SRC/index.1-vibe.html\"  index.html\n# the self-contained tutorial travels with the repo from the VERY FIRST tag: `git checkout 1-vibe`\n# (or any tag) already has the full guided course to follow along with. site/index.html embeds every\n# file's complete source, so it is a complete tutorial on its own — no other file is required to read it.\ncopy site site; copy README.md README.md\nstage 1-vibe   \"vibe: a one-shot todo (the baseline toy)\"\n\ncp \"$SRC/index.2-skill.html\" index.html\ncopy .claude .claude; copy CLAUDE.md CLAUDE.md\nstage 2-skill  \"skill: point it at enso-design — same todo, now it looks like us\"\n\ncp \"$SRC/index.3-kanban.html\" index.html\nstage 3-kanban \"kanban: vibe it into a board (the COLUMNS contract appears)\"\n\n# ── ACT II — the turn: hand it to an agent, then earn each discipline ─────────\ncp \"$ROOT/index.html\" index.html                   # the reference UI: kanban + the agent feed\ncopy board-mcp.mjs board-mcp.mjs; copy .mcp.json       diagram: D.mcp, cap: "MCP is capability — a typed, permissioned set of tools the agent CALLS to act on a real system. It changes what the agent can DO.",
      how: "An MCP server sits at a system boundary and offers a fixed set of <b>tools</b>. Here it's the board: five tools over newline-delimited JSON-RPC on stdio — no HTTP, no deps, so it's checked in and clone-runs. The agent discovers the tools via <span class='mono'>.mcp.json</span>, then <span class='mono'>tools/call</span>s them. Crucially: the agent edits <i>files</i> with its own file tools, but it only touches the <i>board</i> through these five names. <b>That's the boundary you control.</b> One more thing seniors ask: each <span class='mono'>claude -p</span> is a <b>cold, stateless run</b> — its own context, its own token cost, no memory of prior cards. That's why we re-ground it from <span class='mono'>.agent/context.json</span> every build, and (stage 8) why a <i>separate</i> <span class='mono'>claude -p</span> reviewer literally can't collude with the builder — different process, different context.",
      code: [["board-mcp.mjs (the tools + the transport)", C.mcp], [".mcp.json (the wiring)", C.mcpcfg, "json"], ["server.mjs — the streaming build loop", C.loop], ["…and how the stream is forwarded", C.stream]],
      principle: ["Actions out", "Reach for an <b>MCP</b> when the agent needs to <i>act on a system</i> through a stable, auditable interface. Typed, permissioned, swappable — the agent gets <span class='mono'>move_card</span>, never raw access to your DB."],
      construct: "Have Claude build the server itself: <span class='mono'>› add board-mcp.mjs — a stdio JSON-RPC server with tools list/add/move/seed/clean over board.json; export call() so tests can drive it.</span> Then read the <span class='mono'>TOOLS</span> array like a contract: <i>is this the smallest surface that does the job?</i> That review is your security model."
    },
    "5-gate": {
      diagram: D.gate, cap: "The gate stack: the FLOOR (gate + tests) is deterministic and blocks the commit; the RELEASE gate (smoke + receipt) audits and blocks promotion.",
      how: "The gate is a dumb, fast Node script — no model, no judgment. It reads <span class='mono'>index.html</span>, runs a handful of mechanical checks, and <span class='mono'>exit 1</span>s on any violation. Wired as a git <span class='mono'>pre-commit</span> hook, that exit code <i>refuses the commit</i>. A skeptic's instinct is right: it catches slop, not <i>wrong</i> — which is exactly why tests (behavior) sit beside it, and why the same script must run in CI, where <span class='mono'>--no-verify</span> can't skip it. And one bug class the gate itself teaches: a check wrapped in a <span class='mono'>try</span> (like the <span class='mono'>report.mjs</span> lint) <b>fails open</b> — forget it and it silently passes. A gate is only as strong as the cases its author remembered; that's the whole point of the <span class='mono'>broken-gate</span> exercise.",
      code: [["gate.mjs — the deterministic floor", C.gate]],
      principle: ["The floor decides; everything else advises", "A deterministic check the agent can't argue past is what makes autonomy safe. The model writes; a <i>different kind of thing</i> — a dumb script — says yes or no."],
      construct: "Direct it, then harden it adversarially: <span class='mono'>› add gate.mjs: parse the inline JS, forbid emoji and pure #fff/#000, require --accent and a COLUMNS array declaring todo/doing/done; exit 1 with the violations.</span> Then try to <i>beat your own gate</i> (see EXERCISE.md) — the holes you find are the lesson."
    },
    "7-spec": {
      diagram: D.loop, cap: "The whole loop, once the spine exists: you own spec + tasks; the agent implements; the floor decides what lands; the release gate audits.",
      how: "Stages 4–6 kept telling the agent what we wanted, one prompt at a time — and shipped a working, gated, tested loop with <i>no</i> <span class='mono'>spec.md</span> in existence. So the honest reveal isn't 'autonomy forced a spec.' It's: <b>autonomy forced the floor</b> (the gate, and especially the tests — stage 6 genuinely forced the stage-4 refactor). Your floor was already an implicit spec. Stage 7 makes it explicit and hands authorship back to a human: <span class='mono'>spec.md</span>'s acceptance scenarios mirror the <span class='mono'>node --test</span> cases, <span class='mono'>constitution.md</span> is what the reviewer audits, <span class='mono'>tasks.md</span> is where cards come from. A skeptic who <span class='mono'>git log</span>s the build will see the spec arrived last — exactly as told.",
      code: [["the build loop these artifacts govern", C.loop]],
      principle: ["Spec-driven, discovered", "Intent is the source of truth; the code is downstream. The gate and tests are the spec <i>made executable</i> — which is why you can trust an agent to fill in the rest."],
      construct: "Co-author it: <span class='mono'>› from how this board behaves, draft spec.md — user stories, given/when/then acceptance scenarios, success criteria, non-goals.</span> You edit the intent; Claude keeps the tests and the prose in sync with it."
    },
  };

  const SETUP = [
    "git clone https://github.com/qiaopeng55/enso-course enso && cd enso",
    "bash course/build-history.sh .built    # creates the ten stage tags into ./.built",
    "cd .built                              # every 'git checkout <stage>' below runs HERE",
    "git config core.hooksPath .githooks    # arm the floor (it runs on every commit)",
  ];

  const STAGES = [
    { n:"00", tag:"cold open", title:"Watch it build its own feature",
      concept:"Before any explanation — the payoff.",
      why:"The best making-of videos show the finished thing first. Earn attention, then ask for patience.",
      see:"On a clean board, a card you drag writes a whole theme picker live — the floor runs, the card moves itself to Done, the UI flips to dark. Nobody touched the code.",
      cmds:[["node server.mjs              # open http://localhost:4173","type 'add a theme picker' → Enter → drag the card to Doing → watch"]],
      say:"That board just wrote its own feature. Now let me show you how to build the entire thing — from an empty file, in ten moves." },
    { n:"01", tag:"1-vibe", title:"Vibe a todo",
      concept:"One prompt, the model's default. No taste, no plan.",
      why:"This is the bar everyone knows — a throwaway toy. We climb from here.",
      see:"A plain todo opens and works. Honest, ordinary.",
      cmds:[["› build a minimal single-file todo: index.html, vanilla JS, localStorage. works by opening the file."]],
      say:"That's the floor of what 'vibe coding' gets you. It works — because it's a toy." },
    { n:"02", tag:"2-skill", title:"Point it at a Skill",
      concept:"A Skill is a file of taste the agent inherits — written once.",
      why:"You stop re-explaining your standards every prompt. That's why taste lives in a file.",

      cmds:[["› restyle index.html to follow .claude/skills/enso-design exactly."]],

    { n:"03", tag:"3-kanban", title:"Vibe it into a kanban",
      concept:"Vibing goes surprisingly far — a real board, still no rigor.",
      why:"It still works, because it's still a toy. Notice the word COLUMNS — it becomes a contract.",
      see:"Three columns; drag a card; it sticks.",
      cmds:[["› convert the todo to a zen kanban: three columns in a COLUMNS array, native drag-drop, persist. follow the enso-design skill."]],
      say:"We've vibed all the way to a working kanban and nothing has bitten us. Watch what happens next." },
    { n:"04", tag:"4-agentic", title:"Hand it to an agent",
      concept:"The turn. The board gets MCP hands and a streaming build loop.",
      why:"Drag a card to Doing and an agent builds that task — editing files with its file tools, changing the board through MCP. And immediately: how do I trust this? It can write anything.",

      cmds:[["git checkout 4-agentic && node server.mjs","# drag a card to Doing — the agent runs. that 'how do I trust it?' feeling is the rest of the course."]],

    { n:"05", tag:"5-gate", title:"The gate — the leash",
      concept:"A deterministic check the agent can't argue past. The commit floor, part one.",
      why:"A machine — not the author — says no. THIS is why you can hand an agent the keyboard.",
      see:"Run the gate: green. Sneak in an emoji and commit: BLOCKED. The leash holds.",
      cmds:[["node gate.mjs                 # ✓ gate passed","# add an emoji to index.html, then:","git add -A && git commit -m x  # ✗ GATE BLOCKED — emoji found"]],
      say:"It catches slop, not 'wrong' — and a local hook is advisory; the same check in CI is the wall. But a dumb, fast 'no' is exactly what autonomy needs." },
    { n:"06", tag:"6-tests", title:"Tests — behavior",
      concept:"The gate proves it's clean, not that it works. The commit floor, part two.",
      why:"Slop isn't the only failure. Tests catch broken behavior the gate can't see.",
      see:"node --test is green; break persistence and it goes red — and the commit is blocked.",
      cmds:[["node --test                   # a dozen tests: gate rules, MCP add/move, persistence","# the hook now runs both: node gate.mjs && node --test"]],
      say:"Now the floor is complete: clean AND correct-behavior, both deterministic, both blocking. This is what's allowed to land." },
    { n:"07", tag:"7-spec", title:"Write down what you mean",
      concept:"Spec + constitution: make the implicit explicit. The punchline.",
      why:"You built a working, gated, tested loop in 4–6 with NO spec. So be honest: autonomy didn't force a spec — it forced the FLOOR (gate + tests). Stage 7 is realizing that floor was an implicit spec, and making it explicit and human-owned.",
      see:"spec.md (stories, acceptance scenarios = the tests), constitution.md (the rules), plan.md, tasks.md (the board's cards).",
      cmds:[["cat spec.md constitution.md    # the source of truth the gate + tests enforce"]],
      say:"The honest reveal — and it's the stronger one: autonomy forced the floor, not the spec. Your tests were a spec in disguise; now a human owns it." },
    { n:"08", tag:"8-release-gate", title:"The release gate — audit",
      concept:"A second pair of eyes that isn't the author. Smoke, then a receipt.",
      why:"Generator ≠ evaluator. A claim is not proof — so judgment must leave a receipt bound to the diff. It blocks PROMOTION to Done, never the commit.",
      see:"A headless smoke screenshots the running feature; a separate agent writes a diff-bound receipt. Stale the receipt and the card is held for review.",
      cmds:[["node qa.mjs 42                # smoke: loads, renders, toggles → screenshot + receipt","node review.mjs 42 \"add a theme picker\"   # a separate agent audits the bundle"]],
      say:"Say it plainly: the review is a signal, the smoke is rendering, the floor is the proof. Receipts are the audit trail." },
    { n:"09", tag:"9-reference", title:"The ultimate test — live",
      concept:"The whole spine on a feature nobody pre-wrote: the theme picker.",
      why:"This is the cold-open moment again — but now the room understands every layer that made it safe.",
      see:"Add the card → implement → commit floor → release gate → promote to Done → the board reloads wearing the theme picker.",
      cmds:[["node server.mjs               # add 'a theme picker' → drag to Doing → watch the whole loop"]],
      say:"Same magic as minute one — except now you can name every safeguard between the agent and your main branch." },
    { n:"10", tag:"explore-conductor", title:"The circle opens",
      concept:"Recursion — the loop runs itself. You still hold the spine.",
      why:"No one even types the prompt: a conductor reads the board and runs the loop, inside the constitution, spec, and floor you authored.",
      see:"The board moves with nobody at the keyboard. A take-home, not a live beat.",

  // ── render ──
  const main = document.getElementById("main");
  const esc = (s) => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  function cmdBlock(lines) {
    const html = lines.map(l => (l.trim().startsWith("#") || l.includes("# "))
      ? esc(l).replace(/(#.*)$/, '<span class="c">$1</span>') : esc(l)).join("\n");
    return `<div class="cmd"><button class="copy" onclick="copyCmd(this)">copy</button><pre>${html}</pre></div>`;
  }
  const KEYWORDS = /\b(?:const|let|var|function|return|if|else|for|while|of|in|new|await|async|try|catch|export|import|from|class|extends|typeof|instanceof|switch|case|break|continue|throw|default|null|true|false|this)\b/;
  function hlJS(src) {
    const re = /(\/\/[^\n]*|\/\*[\s\S]*?\*\/)|(`(?:\\.|[^`\\])*`|"(?:\\.|[^"\\])*"|'(?:\\.|[^'\\])*')|(\b\d[\d_.]*\b)|([A-Za-z_$][\w$]*)/g;
    let out = "", last = 0, m;
    while ((m = re.exec(src))) {
      out += esc(src.slice(last, m.index));
      const t = m[0];
      if (m[1]) out += `<span class="t-com">${esc(t)}</span>`;
      else if (m[2]) out += `<span class="t-str">${esc(t)}</span>`;
      else if (m[3]) out += `<span class="t-num">${esc(t)}</span>`;
      else if (KEYWORDS.test(t)) out += `<span class="t-key">${esc(t)}</span>`;
      else out += (src[m.index + t.length] === "(") ? `<span class="t-fn">${esc(t)}</span>` : esc(t);
      last = m.index + t.length;
    }
    return out + esc(src.slice(last));
  }
  function hlMd(src) {
    return src.split("\n").map(line => {
      if (/^---\s*$/.test(line)) return `<span class="t-com">${esc(line)}</span>`;
      let h = esc(line).replace(/(\/\/.*)$/, '<span class="t-com">$1</span>');   // trailing // note
      h = h.replace(/^(##[^<]*)/, '<span class="t-head">$1</span>');             // a heading
      return h;
    }).join("\n");
  }
  function hl(src, lang) {
    if (lang === "md") return hlMd(src);
    if (lang === "html" || lang === "sh" || lang === "text") return esc(src);   // the JS tokenizer would mislabel these
    return hlJS(src);                                                            // js / mjs / json
  }
  function codeBlock(fn, src, lang) {
    return `<div class="code"><button class="copy" onclick="copyCmd(this)">copy</button><div class="fn">${fn}</div><pre>${hl(src, lang || "js")}</pre></div>`;
  }
  function deepHTML(tag) {
    const d = DEEP[tag]; if (!d) return "";
    const codes = d.code.map(([fn, src, lang]) => codeBlock(fn, src, lang)).join("");
    return `<div class="deep">
      <div class="label">How it works</div>
      <div class="diagram">${d.diagram}<div class="cap">${d.cap}</div></div>
      <p class="how">${d.how}</p>
      <div class="label">The code</div>${codes}
      <div class="principle"><b>${d.principle[0]}</b>${d.principle[1]}</div>
      <p class="construct">${d.construct}</p>
    </div>`;
  }
  function stageHTML(s, i) {
    const cold = s.n === "00";
    const cmds = s.cmds.map(c => cmdBlock(c)).join("");
    return `<article class="${cold ? "coldopen" : "stage"}" data-i="${i}">
      <div class="head">${cold ? "" : `<span class="num">${s.n}</span>`}<h2>${s.title}</h2><span class="gittag mono">${s.tag}</span></div>
      <p class="concept">${s.concept}</p>
      <div class="why">${s.why}</div>
      <div class="label">What you'll see</div><p class="see">${s.see}</p>
      <div class="label">Run this</div>${cmds}
      <div class="say"><b>Say</b> &nbsp;${s.say}</div>
      ${deepHTML(s.tag)}
    </article>`;
  }

  const hero = `<div class="hero">${enso()}
    <h1>Build an agent you can trust — in ten moves</h1>
    <p class="sub">We vibe a toy that works. Then we hand the keyboard to an agent — and earn, one tiny concept at a time, every safeguard that makes that safe.</p>
    <p class="thesis">The human owns the spine. The agent gets tools. The floor decides what lands. The release gate audits the loop.</p></div>`;

  const principles = `<div class="principles">
    <div class="p"><div class="k">Knowledge in, actions out</div><div class="v">A <b>Skill</b> changes what the agent knows; an <b>MCP</b> changes what it can do. Teach with one, empower with the other.</div></div>
    <div class="p"><div class="k">The floor decides</div><div class="v">Only a deterministic check (gate + tests) may block a commit. A model's opinion is a signal, never the gate.</div></div>
    <div class="p"><div class="k">Generator ≠ evaluator</div><div class="v">The thing that writes the code never grades its own work alone. A different kind of thing does — a script, or a different model.</div></div>
    <div class="p"><div class="k">Receipts, not claims</div><div class="v">A judgment only counts if it leaves an artifact bound to the exact diff — inspectable, versioned, stale-detectable.</div></div>
    <div class="p"><div class="k">Least privilege, bounded</div><div class="v">The narrowest tools that do the job; every autonomous run is one task, time-boxed. Power, inside lines you drew.</div></div>
  </div>`;

  const setup = `<section class="intro">
    <div class="eyebrow">The engineering principles</div>
    <h2>Five rules the whole course earns</h2>
    <p>Every stage exists to make one of these <i>felt</i>, not asserted. Skeptical is the right default — so we don't claim them, we build until they're undeniable.</p>
    ${principles}
    <div class="eyebrow" style="margin-top:46px">Before you start — two ways through</div>
    <h2>Setup</h2>
    <p><b>To explore the reference</b> (what every stage below does), generate the ten tags and work inside <span class="mono">.built</span> — that's where the <span class="mono">git checkout &lt;stage&gt;</span> commands run. <b>To build every file yourself</b> from an empty folder, with no tags at all, follow <span class="mono">BUILD.md</span> instead.</p>
    ${cmdBlock(SETUP)}
    <p style="color:var(--muted);font-size:14px;margin-top:6px">Every <span class="mono">git checkout &lt;stage&gt;</span> below assumes you're in <span class="mono">.built</span>. If you see <span class="mono">pathspec '4-agentic' did not match</span>, you're in the source folder — run the build script and <span class="mono">cd .built</span> first.</p>
    <div class="arc-map">
      <div class="act"><h3>Act I — vibe (it works, it's a toy)</h3><li><span class="n">1</span>vibe a todo</li><li><span class="n">2</span>point it at a Skill</li><li><span class="n">3</span>vibe it into a kanban</li></div>
      <div class="act"><h3>Act II — earn the discipline</h3><li><span class="n">4</span>hand it to an agent</li><li><span class="n">5</span>the gate</li><li><span class="n">6</span>tests</li><li><span class="n">7</span>spec + constitution</li><li><span class="n">8</span>release gate</li><li><span class="n">9</span>the theme picker, live</li><li><span class="n">10</span>the conductor</li></div>
    </div></section>`;

  const foot = `<footer class="foot">${enso()}
    <p><b>Ensō</b> — an agentic kanban board, built as a teaching artifact. The git log is the tutorial: <span class="mono">git checkout 6-tests</span> then <span class="mono">git diff 5-gate 6-tests</span>.</p>
    <p>Want to build every file yourself, no checkouts? <b>Read <span class="mono">BUILD.md</span></b> — the whole tree, then exact prompts + the mechanics of the hook, the MCP, and the gate, with a verify step at every stage.</p>
    <p>This is not a production CI/CD architecture. In production: CI required, a protected branch, a sandboxed agent, scoped tools, no autocommit to main. The pattern is the same; the boundaries are harder.</p></footer>`;

  let SOURCES = { files: [] };
  try { SOURCES = JSON.parse(document.getElementById("enso-sources").textContent || "{}"); } catch (e) {}
  function sourcesSection() {
    if (!SOURCES.files || !SOURCES.files.length) return "";
    const items = SOURCES.files.map(f =>
      `<details class="srcfile"><summary><span class="mono">${esc(f.path)}</span><span class="srcmeta">${esc(f.label)} · ${f.code.split("\n").length} lines</span></summary>${codeBlock(esc(f.path), f.code, f.lang)}</details>`
    ).join("");
    return `<section class="sources"><div class="eyebrow">Self-contained — nothing is fetched</div>
      <h2>The complete source</h2>
      <p>Every file the board needs to build itself — in full, copyable, exactly what <span class="mono">git clone</span> gives you. The stages above distill the key moves; this is the whole artifact, embedded in this page.</p>
      ${items}</section>`;
  }
  main.innerHTML = hero + setup + STAGES.map(stageHTML).join("") + sourcesSection() + foot;

  function copyCmd(btn) {
    const text = btn.parentElement.querySelector("pre").innerText;
    const flash = (ok) => {
      btn.textContent = ok ? "copied" : "press ⌘C";
      btn.classList.toggle("done", ok);
      setTimeout(() => { btn.textContent = "copy"; btn.classList.remove("done"); }, 1500);
    };
    // modern API only works in a secure context (https/localhost). On file:// fall back to execCommand.
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(text).then(() => flash(true)).catch(() => flash(legacyCopy(text)));
    } else {
      flash(legacyCopy(text));
    }
  }
  function legacyCopy(text) {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.cssText = "position:fixed;top:0;left:0;opacity:0";
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    let ok = false;
    try { ok = document.execCommand("copy"); } catch (e) {}
    document.body.removeChild(ta);
    return ok;
  }

  const slides = () => [...document.querySelectorAll(".coldopen, .stage")];
  let cur = 0;
  function setMode(m) {
    document.body.className = m;
    document.getElementById("m-follow").classList.toggle("on", m === "follow");
    document.getElementById("m-present").classList.toggle("on", m === "present");
    if (m === "present") { cur = 0; showSlide(0); }
    else document.querySelectorAll(".active").forEach(e => e.classList.remove("active"));
  }
  function showSlide(i) {
    const s = slides();
    cur = Math.max(0, Math.min(i, s.length - 1));
    s.forEach((el, k) => el.classList.toggle("active", k === cur));
    document.getElementById("prog").style.width = ((cur + 1) / s.length * 100) + "%";
    const sp = document.getElementById("slidepos"); if (sp) sp.textContent = (cur + 1) + " / " + s.length;
    s[cur].scrollIntoView({ block: "start" });
  }
  document.addEventListener("keydown", (e) => {
    if (!document.body.classList.contains("present")) { if (e.key === "f" || e.key === "F") setMode("present"); return; }
    if (e.key === "ArrowRight" || e.key === " ") { e.preventDefault(); showSlide(cur + 1); }
    if (e.key === "ArrowLeft") showSlide(cur - 1);
    if (e.key === "Escape") setMode("follow");
  });
</script>
