<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Todo</title>
<style>
  /* the enso-design Skill, applied: warm paper, sumi ink, ONE vermilion accent, calm. */
  :root { --bg:#fbfbfa; --fg:#1a1a1a; --muted:#9b9b97; --line:#ececea; --accent:#e8553e; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--fg); -webkit-font-smoothing:antialiased;
    font:16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display:flex; justify-content:center; padding:16vh 24px; }
  main { width:100%; max-width:520px; }
  h1 { font-size:13px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-bottom:24px; }
  form { display:flex; gap:12px; border-bottom:1px solid var(--line); padding-bottom:10px; margin-bottom:8px; }
  #text { flex:1; border:none; background:none; font:inherit; color:var(--fg); padding:6px 0; }
  #text::placeholder { color:var(--muted); }
  #text:focus { outline:none; }
  form button { border:none; background:none; font:inherit; font-size:13px; letter-spacing:.08em;
    text-transform:uppercase; color:var(--muted); cursor:pointer; transition:color .15s ease-out; }
  form button:hover { color:var(--accent); }
  ul { list-style:none; }
  li { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--line);
    animation:rise .2s ease-out; }
  @keyframes rise { from { opacity:0; transform:translateY(-3px); } }
  .text { flex:1; }
  .del { border:none; background:none; color:var(--muted); cursor:pointer; opacity:0; padding:0;
    transition:opacity .15s, color .15s; font-size:18px; line-height:1; }
  li:hover .del { opacity:1; }
  .del:hover { color:var(--accent); }
</style>
</head>
<body>
  <main>
    <h1>Today</h1>
    <form id="add">
      <input id="text" placeholder="what needs doing?" autofocus>
      <button>add</button>
    </form>
    <ul id="list"></ul>
  </main>

<script>
  // Same todo as stage 1 — now pointed at the enso-design Skill. The logic didn't change; the taste did.
  const list = document.getElementById("list");
  let items = JSON.parse(localStorage.getItem("todo") || "[]");

  function save() { localStorage.setItem("todo", JSON.stringify(items)); }
  function render() {
    list.innerHTML = "";
    items.forEach((it, i) => {
      const li = document.createElement("li");
      const span = document.createElement("span");
      span.className = "text";
      span.textContent = it;
      const del = document.createElement("button");
      del.className = "del";
      del.textContent = "–";              // a restrained drawn mark, not a loud glyph
      del.setAttribute("aria-label", "remove");
      del.onclick = () => { items.splice(i, 1); save(); render(); };
      li.append(span, del);
      list.appendChild(li);
    });
  }

  document.getElementById("add").onsubmit = (e) => {
    e.preventDefault();
    const t = document.getElementById("text");
    if (t.value.trim()) { items.push(t.value.trim()); t.value = ""; save(); render(); }
  };
  render();
</script>
</body>
</html>
