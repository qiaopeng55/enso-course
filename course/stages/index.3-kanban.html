<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Board</title>
<style>
  :root { --bg:#fbfbfa; --fg:#1a1a1a; --muted:#9b9b97; --line:#ececea; --accent:#e8553e;
    --tint:rgba(232,85,62,0.06); }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--fg); -webkit-font-smoothing:antialiased;
    font:16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display:flex; justify-content:center; padding:14vh 24px; }
  main { width:100%; max-width:840px; }
  h1 { font-size:13px; font-weight:600; letter-spacing:.12em; text-transform:uppercase;
    color:var(--muted); margin-bottom:36px; }
  .board { display:grid; grid-template-columns:repeat(3,1fr); gap:28px; }
  .col { padding-left:28px; border-left:1px solid var(--line); transition:background .18s ease-out; }
  .col:first-child { padding-left:0; border-left:none; }
  .col.over { background:var(--tint); border-radius:6px; }
  h2 { font-size:13px; font-weight:600; letter-spacing:.12em; text-transform:uppercase;
    color:var(--muted); margin-bottom:16px; display:flex; gap:8px; }
  h2 .count { font-weight:400; opacity:.7; }
  ul { list-style:none; }
  .quickadd { width:100%; margin:2px 0 16px; border:none; border-bottom:1px solid var(--line);
    background:none; font:inherit; font-size:15px; color:var(--fg); padding:9px 2px;
    transition:border-color .18s ease-out; }
  .quickadd::placeholder { color:var(--muted); }
  .quickadd:focus { outline:none; border-bottom-color:var(--accent); }
  .card { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--line);
    cursor:grab; animation:enter .18s ease-out; }
  @keyframes enter { from { opacity:0; transform:translateY(-4px); } }
  .card:focus-visible { outline:2px solid var(--accent); outline-offset:3px; }
  .card.dragging { opacity:.45; cursor:grabbing; }
  .text { flex:1; word-break:break-word; }
  .card[data-status="done"] .text { color:var(--muted); text-decoration:line-through; }
  .empty { color:var(--muted); font-size:14px; opacity:.65; padding:12px 0; }
</style>
</head>
<body>
  <main>
    <h1>Today</h1>
    <div class="board" id="board"></div>
  </main>

<script>
  // A zen kanban — still vibe-coded, still a toy, but it works. The columns live in a COLUMNS
  // array (id + title): that's a contract a deterministic gate will check in a later stage.
  const ORDER = ["todo", "doing", "done"];
  const COLUMNS = [
    { id: "todo",  title: "Todo",  empty: "Type above to add the first thing." },
    { id: "doing", title: "Doing", empty: "Nothing in motion yet." },
    { id: "done",  title: "Done",  empty: "Finished work settles here." },
  ];

  const board = document.getElementById("board");
  let cards = JSON.parse(localStorage.getItem("board") || "[]");
  const col = {};
  let dragged = null;

  const save = () => localStorage.setItem("board", JSON.stringify(cards));
  const nextId = () => cards.reduce((m, c) => Math.max(m, +c.id || 0), 0) + 1;

  function render() {
    for (const c of COLUMNS) { col[c.id].list.innerHTML = ""; }
    for (const c of COLUMNS) {
      const mine = cards.filter((k) => k.status === c.id);
      col[c.id].count.textContent = mine.length || "";
      col[c.id].empty.style.display = mine.length ? "none" : "";
      for (const card of mine) col[c.id].list.appendChild(node(card));
    }
  }

  function node(card) {
    const li = document.createElement("li");
    li.className = "card";
    li.dataset.id = card.id;
    li.dataset.status = card.status;
    li.draggable = true;
    li.tabIndex = 0;
    const span = document.createElement("span");
    span.className = "text";
    span.textContent = card.text;
    li.appendChild(span);
    li.addEventListener("dragstart", () => { dragged = card.id; li.classList.add("dragging"); });
    li.addEventListener("dragend", () => { dragged = null; li.classList.remove("dragging"); });
    li.addEventListener("keydown", (e) => {
      const i = ORDER.indexOf(card.status);
      if (e.key === "ArrowRight" && i < 2) { card.status = ORDER[i + 1]; save(); render(); }
      if (e.key === "ArrowLeft" && i > 0) { card.status = ORDER[i - 1]; save(); render(); }
    });
    return li;
  }

  function buildColumn(spec) {
    const section = document.createElement("section");
    section.className = "col";
    const h2 = document.createElement("h2");
    h2.textContent = spec.title;
    const count = document.createElement("span");
    count.className = "count";
    h2.append(count);
    const list = document.createElement("ul");
    const empty = document.createElement("p");
    empty.className = "empty";
    empty.textContent = spec.empty;
    section.append(h2, list, empty);

    if (spec.id === "todo") {
      const add = document.createElement("input");
      add.className = "quickadd";
      add.placeholder = "add a task — press Enter";
      add.addEventListener("keydown", (e) => {
        if (e.key !== "Enter" || !add.value.trim()) return;
        cards.unshift({ id: nextId(), text: add.value.trim(), status: "todo" });
        add.value = "";
        save(); render();
      });
      section.insertBefore(add, list);
    }

    section.addEventListener("dragover", (e) => { e.preventDefault(); section.classList.add("over"); });
    section.addEventListener("dragleave", (e) => { if (!section.contains(e.relatedTarget)) section.classList.remove("over"); });
    section.addEventListener("drop", (e) => {
      e.preventDefault();
      section.classList.remove("over");
      const c = cards.find((k) => String(k.id) === String(dragged));
      if (c) { c.status = spec.id; save(); render(); }
    });

    board.append(section);
    col[spec.id] = { list, empty, count };
  }

  COLUMNS.forEach(buildColumn);
  render();
</script>
</body>
</html>
